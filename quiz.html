<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗与远方 · 答题系统</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: #f5f5f5; color: #333; min-height: 100vh; }
  .layout { display: flex; max-width: 1200px; margin: 0 auto; padding: 12px 8px; gap: 12px; }
  .sidebar { width: 330px; flex-shrink: 0; }
  .sidebar-title { font-size: 13px; color: #888; margin-bottom: 8px; padding: 0 4px; }
  .btn-download { width: 100%; margin-top: 12px; padding: 10px; background: #1976d2; color: #fff;
                   border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
                   cursor: pointer; }
  .btn-download:hover { background: #1565c0; }
  .nav-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .nav-btn { padding: 12px 0; border: none; border-radius: 6px; font-size: 15px;
              cursor: pointer; font-weight: 500; background: #e0e0e0; color: #555;
              transition: all 0.15s; }
  .nav-btn:hover { background: #bdbdbd; }
  .nav-btn.active { outline: 2px solid #1976d2; }
  .nav-btn.correct { background: #43a047; color: #fff; }
  .nav-btn.wrong { background: #e53935; color: #fff; }
  .main { flex: 1; min-width: 0; }
  .progress { font-size: 13px; color: #888; margin-bottom: 12px; text-align: right; }
  .card { background: #fff; border-radius: 12px; padding: 24px;
           box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .tag { display: inline-block; font-size: 12px; padding: 2px 10px;
          border-radius: 20px; background: #fff3e0; color: #e65100; margin-bottom: 14px; }
  .stem { font-size: 17px; line-height: 1.7; margin-bottom: 20px; font-weight: 500; }
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .option { display: flex; align-items: center; padding: 12px 16px; border-radius: 8px;
             border: 1.5px solid #e0e0e0; cursor: pointer; font-size: 15px;
             transition: all 0.15s; user-select: none; }
  .option:hover:not(.disabled) { border-color: #1976d2; background: #e3f2fd; }
  .option.selected { border-color: #1976d2; background: #e3f2fd; }
  .option.correct { border-color: #43a047; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
  .option.wrong { border-color: #e53935; background: #ffebee; color: #c62828; }
  .option.disabled { cursor: default; }
  .option .label { font-weight: 600; margin-right: 10px; min-width: 24px; }
  .btn-row { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px;
          cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-submit { background: #1976d2; color: #fff; }
  .btn-next { background: #43a047; color: #fff; }
  .btn-submit:hover:not(:disabled) { background: #1565c0; }
  .btn-next:hover:not(:disabled) { background: #388e3c; }
  .result { margin-top: 16px; padding: 14px 16px; border-radius: 8px;
             font-size: 15px; display: none; }
  .result.show { display: block; }
  .result.ok { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }
  .result.fail { background: #ffebee; color: #c62828; border-left: 4px solid #e53935; }
  .analysis { margin-top: 16px; background: #f9f9f9; border-radius: 8px;
               padding: 16px; font-size: 14px; line-height: 1.8; display: none;
               white-space: pre-wrap; color: #555; }
  .analysis.show { display: block; }
  .analysis-title { font-weight: 700; font-size: 15px; color: #333; margin-bottom: 8px; }
  .finish { text-align: center; padding: 40px 0; }
  .finish h2 { font-size: 24px; color: #1976d2; margin-bottom: 8px; }
  .finish p { color: #666; font-size: 15px; margin-bottom: 8px; }
  .timer { display: inline-block; font-size: 13px; font-weight: 600; padding: 2px 10px;
            border-radius: 20px; background: #e3f2fd; color: #1976d2; margin-left: 10px; }
  .timer.warning { background: #fff3e0; color: #e65100; }
  .timer.danger { background: #ffebee; color: #c62828; }
  .question-img { display: block; max-width: 50%; border-radius: 8px;
                   margin: 0 auto 20px; }

  /* 宫格样式 */
  .grid-wrap { margin-bottom: 20px; }
  .grid-slots { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
  .grid-slot { width: 52px; height: 52px; background: #e53935; border-radius: 8px;
               display: flex; align-items: center; justify-content: center;
               font-size: 22px; font-weight: 700; color: #fff; cursor: pointer;
               border: 2px solid #c62828; transition: all 0.15s; }
  .grid-slot.filled { background: #c62828; }
  .grid-slot.correct { background: #43a047; border-color: #388e3c; }
  .grid-slot.wrong { background: #e53935; border-color: #c62828; animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .grid-candidates { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .grid-row { display: flex; gap: 6px; }
  .grid-cell { width: 52px; height: 52px; background: #f5f5f5; border-radius: 8px;
               display: flex; align-items: center; justify-content: center;
               font-size: 22px; font-weight: 700; color: #333; cursor: pointer;
               border: 2px solid #e0e0e0; transition: all 0.15s; user-select: none; }
  .grid-cell:hover:not(.used):not(.disabled) { background: #e3f2fd; border-color: #1976d2; }
  .grid-cell.used { opacity: 0.3; cursor: default; }
  .grid-cell.disabled { cursor: default; }
</style>
</head>

的头发，只能叫“束发”，两\n个人的头发才叫“结发“呀！\n你愿意主动思考题目背后的故事，这就已经是小\n小文学家啦！继续加油，古诗文的世界还有好多\n这样有趣的秘密等你去发现哦～\n试题解析：\n“结发“在古时是指结婚时男女双方各取头上一根\n头发，合而作一结，男女双方结为夫妻。\n---", "grid": null, "image": null}, {"num": 7, "type": "单选题", "stem": "以下四个关键词出自一首诗，该诗所属的朝代是____。①黑云 ②白雨 ③忽吹散 ④望湖楼", "options": ["A.唐朝", "B. 宋朝", "C.元朝", "D.清朝"], "answer": "B", "analysis": "AI解析（仅供参考）：\n同学，你好呀！看到这么多关键词，是不是觉得\n有点像在玩“古诗拼图“呀？别着急，我们一起来\n把这幅图拼完整。\n这些词组合在一起，描绘的是这样一幅夏日奇\n景：天空突然乌云翻滚，像打翻了墨汁（黑\n云），紧接着白亮亮的雨点像珍珠一样蹦进游船\n（白雨）。结果一阵大风卷地而来，竟然把乌云\n和暴雨都“呼“地一下吹散了（忽吹散），太阳出\n来后，大家回头看那座望湖楼，发现水天一色，\n漂亮极了！\n你看，画面感是不是特别强？这就是北宋大文豪\n苏轼的《六月二十七日望湖楼醉书》。题目问这\n首诗的朝代，苏轼是北宋人，所以这道题的正确\n答案是B.宋朝。\n小窍门来啦：\n记诗人和朝代，可以像串糖葫芦一样，把一串线\n索连起来！你可以记住“唐有李白诗，宋有苏轼\n词”。提到“望湖楼”、“白雨跳珠“这些非常灵动洒\n脱的写雨名句，大概率就是苏轼在宋朝写的。下\n次看到这几个词，就直接把它们和宋朝、苏轼锁\n定在一起，是不是很简单？\n你已经很厉害了，能从几个词就猜出一首诗！继\n续加油你古诗词小达人又近了一步！\n---", "grid": null, "image": null}, {"num": 8, "type": "判断题", "stem": "诗句\"烈火焚烧若等闲\"中的\"等闲\"在这 里指：平常。", "options": ["A. 正确", "B. 错误"], "answer": "A", "analysis": "AI解析（仅供参考）：\n小朋友，别急着皱眉，咱们先把这道题当成一\n个“捉迷藏“游戏，一起把藏在诗句里的小秘密揪\n出来好不好？\n场景还原\n这句诗来自明代大诗人于谦的《石灰吟》。请你\n想象一个画面：一块坚硬灰扑扑的石灰石，被矿\n工伯伯投进了几千度的火炉里。可是你看它，不\n仅没有哭喊，反而很轻松、很平静，好像在\n说：“这不算什么大事儿。“这种“不害怕、不当\n一回事\"的神态，就是诗句里的“若等闲”。\n精准破题\n·你的判断：对\n·恭喜你，你答对了！真棒！\n正确路径是这样的：“等闲\"这个词在古代\n汉语里，确实是“平常、寻常、随便\"的意\n思。在诗句里，石灰把熊熊烈火的巨大痛\n苦，看作是”一件很平常的事”，这样写才\n能突出它那不怕牺牲的勇敢精神。你把它\n理解成“平常”，完全抓住了这首诗的精\n骨髓。\n举一反三\n其实大诗人岳飞在《满江红》里也用过这\n个词：“莫等闲、白了少年头，空悲切。“\n这里的“莫等闲“就是“不要随随便便、不要\n轻易地浪费时间”。你看，只要记住“等闲\n就是平常随便”，这两个诗句的意思就都通\n顺了对不对？以后遇到这个词，你就放心\n大胆地往“平常、轻易“这个方向想。\n结束语\n你不仅判断对了，还能动脑筋思考字词背\n后的深音老师要给你竖一个大姆指！保\n---", "grid": null, "image": null}, {"num": 9, "type": "判断题", "stem": "我国古代最长的叙事诗是《木兰 诗》。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n哈哈，宝贝，看着这道题是不是有点像踩进了一\n个\"小水坑\"？没关系的，我们一起拍拍裤子上的\n水，看清楚这个坑到底长什么样！\n咱们先来在脑子里放个\"小电影”：\n《木兰诗》讲的是木兰姐姐“唧唧复唧唧“地织\n布，然后替父从军，最后“对镜贴花黄“回女装的\n故事，节奏特别快，像一部精彩的动画短片。\n而《孔雀东南飞》呢，讲的是刘兰芝和焦仲卿\n悲欢离合的故事，因为误会、抗争，情节一个接\n一个，足足讲了1700多个字，像一部有好多集\n的长篇连续剧。\n错在哪里了？\n很多小朋友会掉进这个坑，是因为《木兰诗》太\n有名啦，大家潜意识里觉得“最有名的“就是“最\n长的”。这就是思维上的\"张冠 m": "以下四个关键词出自一首诗，诗的题 目是（）（1）楼兰（2）黄沙 (3）青海（4）玉门关", "options": ["A.《凉州词》", "B.《出塞》", "C.《从军行》", "D.《滁州西涧》"], "answer": "C", "analysis": "AI解析（仅供参考）：\n哈喽，小探险家！别因为这道题皱眉呀～王老\n师来了！这道题表面考关键词，其实是在考你对\n边塞那位“大将军“的记忆力呢。来，咱们穿上盔\n甲，一起去战场看看！\n场景还原\n想象一下你站在唐朝的青海湖边，头顶是黑压压\n的长云，远处的雪山都黯淡了。再往西看，就是\n那座孤独的玉门关。战士们的铠甲在漫天的黄沙\n里都磨破了，可他们咬着牙说：“不打败楼兰的\n敌人，我们绝不回家！“\n耳边是不是响起了那句豪言壮语？\n精准破题\n·哪里容易错：看到玉门关”，很多小朋友\n会跑去抢答A或B，因为《凉州词》和\n《出塞》里都提到过它。但别忘了，它们\n有名句没错，却凑不齐“黄沙“和“楼兰\"这俩\n词儿。\n正确路径：能有这么完整画面、还带“楼\n兰“这个破敌决心的，就是王昌龄的**《从\n军行》*。\n青海长云暗雪山，孤城遥望玉门关。\n黄沙百战穿金甲，不破楼兰终不还。\n你看，四个词是不是手拉手都在里面了？\n正确答案是C！\n举一反三\n给你一个记忆小窍门：“楼兰“其实是个“破\n敌“的信号弹。在古诗里，只要有“破楼\n兰”、“斩楼兰”，多半就是《从军行》，因\n为战士们把它当成画在战旗上的目标，以\n此明志！\n搞懂了这个“密码”，下次再看到它们，你\n就能像大将军点兵一样，一找一个准儿！\n继续加油，你对古诗的感觉越来越到位\n啦！\n试题解析：\n《从军行》\n作者：杨炯\n朝代：唐代\n烽火照西京，心中自不平。\n牙璋辞凤阙，铁骑绕龙城。\n雪暗凋旗画，风多杂鼓声。\n宁为百夫长，胜作一书生。\n赏析：\n这首诗借用乐府旧题“从军行”，描写一个读书士\n子从军边塞、参加战斗的全过程。仅仅四十个\n宇，既揭示出人物的心理活动，又渲染了环境气\n氛，笔力极其雄劲。\n第三句“牙璋辞风阙”，描写军队辞京出师的情\n景。\n五六两句开始写战斗，诗人却没有从正面若笔\n而是通过景物描写进行烘托。\n连人别目机择以免征军队的旗“和喆”\n---", "grid": null, "image": null}, {"num": 56, "type": "判断题", "stem": "杜甫《登高》是一首登临抒怀之作， 贯穿诗歌的情感基调是思乡。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n哇，同学你好，我是你的大语文伙伴！别灰\n心，这道题里藏着一个小陷阱，很多同学刚开始\n都会被它迷惑。我们一起来把这个小调皮“揪出\n来！\n我们先闭上眼睛，一起走进这幅画\n想象一下，1200多年前的一个秋天，一位两斑\n白、身体瘦弱的老爷爷，独自登上了长江边的高\n台。风刮得“呼呼“响，天高云淡，远处传来猿猴\n不住声的哀鸣。水鸟在江面上低低地盘旋，脚下\n是无边无际飘落的枯叶，眼前是滚滚奔流、永不\n停歇的长江水。这就是杜甫爷爷笔下的《登\n高》。\n现在，我们来分析那个错误：思乡。\n万里悲秋常作客“这句诗确实让人鼻子一酸。诗\n人说，我远离家乡万里，常年漂泊在外，在这凄\n凉的秋天，心里真是悲伤。你看，这里“的确有\n思乡的一部分，但这不是情感的主调”。\n诗人为什么悲伤？不仅仅是想家，更是因为他看\n到萧瑟的秋景，想到自己年老多病，孤单一人，\n连酒都不能喝了。他的悲伤像这滔滔江水，包含\n了对自己身世的感慨，对国家战乱未平的忧虑。\n这是一种特别宏大、特别苍凉的“悲概”。\n所以，如果要用一个词贯穿全诗的情感，应该\n是“悲慨“或“悲壮”，而不是单薄的”思乡”。如\n果说思乡是“想妈妈时偷偷抹眼泪”，那杜甫的悲\n概就是“站在高高的山上，对着天地宇宙发出的\n一声长叹”。\n给你一个小窍门：\n以后看到杜甫爷爷晚年写的诗，尤其是那些\n写“秋天”、“登高”、“多病”的，可以多想想：他\n哭，是不是不仅为自己，也为天下人？这就叫\n“沉郁顿挫”。\n太棒了，你现在已经理解了这个错题的精髓！你\n不仅知道了正确答案，还走进了杜甫爷爷的心\n里。继续加油，下一个诗词小侦探就是你！\n试题解析：\n《登高》\n作者：杜甫\n朝代：唐代\n风急天高猿啸哀，清沙白鸟飞回。\n无边落木萧萧下，不尽长江滚滚来。\n万里悲秋常作客，百年多病独登台。\n艰难苦恨繁霜登，潦倒新停浊酒杯。\n赏析：\n此诗载于《杜工部集》，全诗通过登高所见\n秋江景色，倾诉了诗人长年漂泊、老病孤愁的复\n杂感情，慷慨激越、动人心弦。\n此诗前四句写登高见闻。首联对起。诗人围\n绕变州的特定环境，用“风急“二字带动全联，一\n开头就写成了千古流传的佳句。变州向以猿多著\n称，峡口更以风大闻名。秋日天高气爽，这里却\n猎猎多风。诗人登上高处，峡中不断传来“高猿\n长啸“之声，大有“空谷传响，哀转久绝”（《水经\n注·江水》）的意味。诗人移动视线，由高处转\n向江水洲渚，在水清沙白的背景上，点缀着迎风\n飞翔、不住回旋的鸟群，真是一幅精美的画图。\n其中天、风，沙、渚，猿啸、鸟飞，天造地设\n自然成对。不仅上下两句对，而且还有句中自\n对，如上句“天“对“风”，“高“对“急”：下\n---", "grid": null, "image": null}, {"num": 57, "type": "判断题", "stem": "贾岛，宋代代诗人。早年出家为僧， 后还俗为官。贾岛是一位苦吟诗人， 韩愈曾用“郊寒岛瘦\"来形容他和另外 一位苦吟诗人孟郊。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友，别灰心，这道题里的陷阱可把不少人\n都绊倒过呢！你能关注到贾岛的小故事\n已经很棒啦，现在让我们一起把错误变成进步的\n台阶吧。\n首先，咱们来“破案”—错在哪里了？\n你判断这道题时，是不是觉得郊寒岛瘦这个词\n特别耳熟，所以其他信息就都默认是对的了？这\n里藏着一个小小的时间误区：贾岛不是宋代诗\n人，他是唐代诗人哦。\n接着，我们坐上时光机，去唐朝看一看。\n想象一下，在唐朝的某个深夜，街上静悄悄的。\n有位骑着小毛驴的叔叔，正一边走一边用手比划\n着，嘴里还念念有词：“到底是推门好，还\n是敲门好呢？“他想得太入迷，竞然冲撞了一位\n大官的车队。这位大官就是大名鼎鼎的韩愈，他\n不仅没生气，反而和这位叔叔一起琢磨起来，最\n后定下了“僧敲月下门“的佳句。这位骑驴的叔\n叔，就是我们故事的主角一苦吟诗人贾岛。\n所以你看，贾岛是唐朝人，他和另一位叫孟郊的\n唐代诗人，因为作诗都特别刻苦、风格清冷，才\n被韩愈伯伯形容为“郊寒岛瘦“的。题目里除了“宋\n代这两个字是错的，其他信息，比如他当过和\n尚、是苦吟诗人，都是正确的。\n最后，送你一个记忆小窍门：\n可以把“唐代“和“苦吟“连在一起想。就像我们写\n作文，为一个好词反复推敲，贾岛也是这样。以\n后只要提到“推敲“的故事，就立刻想到唐朝的贾\n岛，保证不会再记错朝代啦！\n这次失误正好帮你加深了印象，下次再遇到这道\n题，你肯定就是满分选手了！继续加油，知识的\n宝藏在等你探索。\n试题解析：\n郊寒岛瘦，汉语成语，拼音为jiaohandao\nshou，出自宋代苏轼《祭柳子玉文》，原指唐代\n诗人孟郊、贾岛诗歌简音孤悄的艺术风格，后引\n申为形容意境相似的诗文作品。\n---", "grid": null, "image": null}, {"num": 58, "type": "单选题", "stem": "以下诗作中，与《九月九日忆山东兄弟》是同一作者的一项是____", "options": ["A.《大林寺桃花》", "B.《乡村四月》", "C.《赠刘景文》", "D.《鸟鸣涧》"], "answer": "D", "analysis": "AI解析（仅供参考）：\n小朋友，别灰心哦，这道题考的是诗人的“朋友\n圈”，我们一起来把王维爷爷找出来吧！\n我们先回到《九月九日忆山东兄弟》的画面：重\n阳节那天，一个少年独自在异乡，看着别人插茱\n英、登高，心里酸酸的。这就是王维17岁时写下\n的思念。他就像一位能把心事说成画的诗人。\n来看看哪位老爷爷才是王维的好朋友：\n·A.《大林寺桃花》：“人间四月芳菲尽，山\n寺桃花始盛开”，这是白居易爷爷在山寺发\n现的春天秘密。\nB.《乡村四月》：“绿遍山原白满川，子规\n声里雨如烟”，翁卷爷爷带我们看江南烟\n雨。\nC.《赠刘景文》：“一年好景君须记，最是\n橙黄橘绿时”，苏轼爷爷在给好朋友打气\n呢。\nD.《鸟鸣涧》：“人闲桂花落，夜静春山\n空。月出惊山鸟，时鸣春涧中。“——\n你闻\n到了静夜里的桂花香，听到了山涧鸟鸣\n吗？这就是王维爷爷呀！\n你可能会掉进的\"小陷阱”：\n很多小朋友会被c项迷惑，想着“赠“字像思念\n就选了苏轼。但《赠刘景文》是鼓励朋友的，作\n者是宋代大文豪苏东坡：而《九月九日忆山东兄\n弟》是唐代诗人王维思念家人的。他们跨越朝\n代，可不能握手哦。\n推导小窍门：\n王维的作品，常常像一幅水墨动画，有“空\n山”\"鸟鸣”月色”这些清幽的画面。以后碰到这\n种“谁是谁的诗“的题目，可以试若连一连朝代和\n诗人的“超能力\"：王维=诗中有画，白居易=明\n白如话，苏轼=哲理达观。这样就不会迷路啦！\n记住这个小技巧，下次你就能像小侦探一样，从\n诗里的气味和颜色，一眼认出作者！\n试题解析：\n《鸟鸣涧》\n作者：王维\n朝代：唐代\n人闲桂花落，夜静春山空。\n月出惊山鸟，时鸣春润中。\n赏析：\n关于这首诗中的桂花，颇有些分歧意见。一种解\n释是桂花有春花、秋花、四季花等不同种类，此\n处所写的当是春日开花的一种。另一种意见认为\n文艺创作不一定要照搬生活，传说王维画的《袁\n安卧雪图》，在雪中还有碧绿的芭蕉，现实生活\n中不可能同时出现的事物，在文艺创作中是允许\n的。\n不过，这首诗是王维题友人所居的《皇甫岳云溪\n杂题五首》之一。五首诗每一首写一处风景，接\n近于风景写生，而不同于一般的写意画，因此，\n以解释为山中此时实有的春桂为妥。\n白活文\n---", "grid": null, "image": null}, {"num": 59, "type": "十二宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "天光云影共徘徊", "analysis": "AI解析（仅供参考）：\n小朋友，别皱眉头呀！这道“字谜诗“就像和我们\n捉迷藏，没找到那句诗一点也不奇怪，我们一起\n把它揪出来，好不好？\n咱们先来读读这些字：共、径、云、竹、一、\n天、徊、光、徘、独、影、留。看起来乱糟糟\n的，但如果能找出一句会发光的诗，你会想到哪\n句呢？\n闭上眼睛想象一下：一面方方的池塘像打开的巨\n大镜子，天空的光彩和云朵的影子，都舍不得离\n开，在水面上慢悠悠地来回走动...对了，就是\n大诗人朱嘉在《观书有感》中写的—“天光云\n影共徘徊”。\n现在我们当一回文字侦探：从这堆字里\n天、光、云、影、共、徘、徊这七个字，正好手\n拉手排成这句诗！“共“拉着“徘徊“的手，说天空\n和云影一起散步呢。剩下的“径、竹、一、独、\n留”，是题目故意放出的“烟弹”，就像躲猫猫时\n藏在树后的其他小伙伴。\n你一开始是不是被“独和留“带跑了？觉得会不\n会是“独留云影之类的？这就是小陷阱—我们\n读古诗时，不妨先想想最熟悉、最有画面感的句\n子，用美丽画面唤醛记忆，而不是一个个字硬\n拼。\n小窍门：碰到这类题，先在脑海里放一遍“古诗\n小电影”，比如池塘、天空、云朵，这句诗很容\n易就亮起来啦。\n今天咱们破了诗谜，你就像个小诗人，又收获了\n一把打开诗意的钥匙。继续带着好奇心去发现美\n吧，下次你一定能比云影跑得还快！\n试题解析：\n《观书有感》\n作者：朱熹\n朝代：南宋\n半亩方塘一鉴开，天光云影共徘徊\n问渠那得清如许？为有源头活水来\n赏析：\n诗人以景喻理，形象而又深刻，巧妙地表达了一\n种微妙的而又令人愉悦的读书感受\n这首诗所表现的读书有所领悟时的那种灵气流\n动、思路明畅、精神偷悦活泼而自得自在的境\n界，正是作者作为一位大学问家的切身的读书感\n受\n诗人在作品中所表达的感受虽然仅就读书而言，\n却寓意深刻，内涵丰富，可以做广泛的理解\n特别是“问渠那得清如许，为有源头活水来“两\n句，表面是写水因为有源头活水不断注入才清\n如许”，实则预示人要心灵澄明，就得不断认真\n读书，不断求新求异，不断获取新知，才能达到\n至高的境界\n白话文：\n半亩大的方形池塘像一面镜子一样展现在眼前，\n天空的光彩和浮云的影子都在镜子中一起移动\n---", "grid": {"slots": 7, "rows": [["共", "径", "云", "竹"], ["一", "天", "徊", "光"], ["绯", "独", "影", "留"]]}, "image": null}, {"num": 60, "type": "十二宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "洛阳亲友如相问", "analysis": "AI解析（仅供参考）：\n哇，同学，你遇到的这道题挺有趣的，像在玩一\n个“诗词拼图“呢！别急，我们一起来把正确的诗\n句“拼\"出来吧。\n你看，这串字是：项友阳便如襄相阳问亲下洛\n看着乱乱的，对吧？其实啊，它们当中藏看王昌\n龄《芙蓉楼送辛渐》里特别有名的一句：“洛阳\n亲友如相问。我们来当侦探，把多余的字挑出\n去，只留下需要的那七个。\n·洛→在末尾藏着呢，拿出来。\n·阳一这里有两个“阳”，我们只需要一个。\n亲一第十个字就是“亲”。\n·友→第二个字“友”。\n如→第五个字“如”。\n相一第八个字“相”。\n问→第九个字\"问”。\ let current = 0;
let answered = false;
const results = {};
const timings = {};  // {idx: {start, elapsed, timeout}}

const TIMER_SECONDS = 30;
let timerInterval = null;
let timerStart = null;

function startTimer() {
  clearInterval(timerInterval);
  timerStart = Date.now();
  let remaining = TIMER_SECONDS;
  updateTimerDisplay(remaining);
  timerInterval = setInterval(() => {
    remaining--;
    updateTimerDisplay(remaining);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      if (!answered) {
        timings[current] = { elapsed: TIMER_SECONDS, timeout: true };
        autoSubmit();
      }
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  if (timerStart !== null) {
    const elapsed = Math.min(Math.round((Date.now() - timerStart) / 1000), TIMER_SECONDS);
    if (!timings[current]) timings[current] = { elapsed, timeout: false };
    timerStart = null;
  }
}

function updateTimerDisplay(remaining) {
  const el = document.getElementById('timer');
  if (!el) return;
  el.textContent = `⏱ ${remaining}s`;
  el.className = 'timer' + (remaining <= 5 ? ' danger' : remaining <= 10 ? ' warning' : '');
}

function autoSubmit() {
  const q = questions[current];
  const isGrid = !!q.grid;
  answered = true;
  if (isGrid) {
    const userAns = gridInput.join('');
    const isOk = gridInput.length === q.grid.slots && userAns === q.answer;
    results[current] = isOk;
    document.querySelectorAll('.grid-slot').forEach(s => s.classList.add(isOk ? 'correct' : 'wrong'));
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.add('disabled'));
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : `❌ 时间到！正确答案是：${q.answer}`;
  } else {
    const selected = document.querySelector('.option.selected');
    const chosen = selected ? selected.dataset.letter : null;
    const correct = q.answer;
    results[current] = chosen === correct;
    document.querySelectorAll('.option').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === correct) o.classList.add('correct');
      else if (o.dataset.letter === chosen) o.classList.add('wrong');
    });
    const isOk = chosen === correct;
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : (chosen ? `❌ 回答错误，正确答案是 ${correct}` : `❌ 时间到！正确答案是 ${correct}`);
  }
  document.getElementById('analysis').classList.add('show');
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
  const timerEl = document.getElementById('timer');
  if (timerEl) timerEl.style.display = 'none';
  updateNav();
}

function buildNav() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = questions.map((q, i) =>
    `<button class="nav-btn" id="nav-${i}" onclick="jumpTo(${i})">${i+1}</button>`
  ).join('');
}

function updateNav() {
  questions.forEach((_, i) => {
    const btn = document.getElementById('nav-' + i);
    btn.className = 'nav-btn';
    if (i === current) btn.classList.add('active');
    if (results[i] === true) btn.classList.add('correct');
    else if (results[i] === false) btn.classList.add('wrong');
  });
}

function jumpTo(idx) {
  stopTimer();
  current = idx;
  render(idx);
}

function buildGridHtml(grid, answeredInput) {
  const slots = grid.slots;
  // 红色答案槽
  let slotsHtml = '<div class="grid-slots" id="grid-slots">';
  for (let i = 0; i < slots; i++) {
    const ch = answeredInput ? answeredInput[i] || '' : '';
    slotsHtml += `<div class="grid-slot${ch ? ' filled' : ''}" id="slot-${i}" onclick="removeSlot(${i})">${ch}</div>`;
  }
  slotsHtml += '</div>';
  // 候选字格
  let candidatesHtml = '<div class="grid-candidates" id="grid-candidates">';
  for (const row of grid.rows) {
    candidatesHtml += '<div class="grid-row">';
    for (const ch of row) {
      const used = answeredInput && answeredInput.includes(ch) &&
                   answeredInput.split('').filter(c=>c===ch).length >=
                   row.filter(c=>c===ch).length;
      candidatesHtml += `<div class="grid-cell${answeredInput ? ' disabled' : (used ? ' used' : '')}"
        data-char="${ch}" onclick="fillSlot('${ch}', this)">${ch}</div>`;
    }
    candidatesHtml += '</div>';
  }
  candidatesHtml += '</div>';
  return slotsHtml + candidatesHtml;
}

let gridInput = [];  // 当前宫格已填入的字

function fillSlot(ch, el) {
  if (answered || el.classList.contains('used') || el.classList.contains('disabled')) return;
  const q = questions[current];
  if (gridInput.length >= q.grid.slots) return;
  gridInput.push(ch);
  el.classList.add('used');
  const idx = gridInput.length - 1;
  const slot = document.getElementById('slot-' + idx);
  slot.textContent = ch;
  slot.classList.add('filled');
}

function removeSlot(idx) {
  if (answered) return;
  if (idx >= gridInput.length) return;
  gridInput.splice(idx, 1);
  const q = questions[current];
  for (let i = 0; i < q.grid.slots; i++) {
    const slot = document.getElementById('slot-' + i);
    const ch = gridInput[i] || '';
    slot.textContent = ch;
    slot.classList.toggle('filled', !!ch);
  }
  refreshCandidateUsed();
}

function removeSlot(idx) {
  if (answered) return;
  if (idx >= gridInput.length) return;
  // 找到对应候选字格，取消 used
  const removedChar = gridInput[idx];
  gridInput.splice(idx, 1);
  // 重新渲染槽
  const q = questions[current];
  for (let i = 0; i < q.grid.slots; i++) {
    const slot = document.getElementById('slot-' + i);
    const ch = gridInput[i] || '';
    slot.textContent = ch;
    slot.classList.toggle('filled', !!ch);
  }
  // 重置候选字格的 used 状态（重新计算）
  refreshCandidateUsed();
}

function refreshCandidateUsed() {
  const cells = document.querySelectorAll('.grid-cell');
  // 统计 gridInput 里每个字的使用次数
  const usedCount = {};
  for (const ch of gridInput) usedCount[ch] = (usedCount[ch] || 0) + 1;
  // 对每个候选格，按同字出现顺序决定是否标 used
  const seen = {};
  cells.forEach(cell => {
    const ch = cell.dataset.char;
    seen[ch] = (seen[ch] || 0) + 1;
    cell.classList.toggle('used', seen[ch] <= (usedCount[ch] || 0));
  });
}

function render(idx) {
  answered = idx in results;
  gridInput = [];
  const q = questions[idx];
  const total = questions.length;
  document.getElementById('progress').textContent = `第 ${idx+1} / ${total} 题`;

  const isGrid = !!q.grid;
  let bodyHtml = '';

  if (isGrid) {
    const answeredInput = answered ? q.answer : null;
    bodyHtml = `<div class="grid-wrap">${buildGridHtml(q.grid, answeredInput)}</div>`;
    if (answered) gridInput = q.answer.split('');
  } else {
    const optHtml = q.options.map((opt, i) => {
      const letter = opt.match(/^([A-D])/)?.[1] || String.fromCharCode(65+i);
      const text = opt.replace(/^[A-D][\.．。]\s*/, '');
      return `<div class="option" data-letter="${letter}" onclick="select(this)">
        <span class="label">${letter}</span><span>${text}</span>
      </div>`;
    }).join('');
    bodyHtml = `<div class="options" id="options">${optHtml}</div>`;
  }

  document.getElementById('card').innerHTML = `
    <div class="tag">${q.type}<span id="timer" class="timer" style="display:none">⏱ ${TIMER_SECONDS}s</span></div>
    <div class="stem">${q.stem}</div>
    ${q.image ? `<img class="question-img" src="${q.image}">` : ''}
    ${bodyHtml}
    <div class="btn-row">
      <button class="btn btn-submit" id="btn-submit" onclick="submit()" ${answered ? 'style="display:none"' : ''}>提交答案</button>
      <button class="btn btn-next" id="btn-next" onclick="next()" ${answered ? '' : 'style="display:none"'}>
        ${idx < total-1 ? '下一题 →' : '完成 ✓'}
      </button>
    </div>
    <div class="result ${answered ? 'show ' + (results[idx] ? 'ok' : 'fail') : ''}" id="result">
      ${answered ? (results[idx] ? '✅ 回答正确！' : `❌ 回答错误，正确答案是：${q.answer}`) : ''}
    </div>
    <div class="analysis ${answered ? 'show' : ''}" id="analysis">
      <div class="analysis-title">📖 解析</div>
      ${q.analysis}
    </div>
  `;

  if (!isGrid && answered) {
    document.querySelectorAll('.option').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === q.answer) o.classList.add('correct');
    });
  }

  if (isGrid && answered) {
    const isOk = results[idx];
    document.querySelectorAll('.grid-slot').forEach(s => {
      s.classList.add(isOk ? 'correct' : 'wrong');
    });
  }

  if (!answered) {/* startTimer(); */}
  updateNav();
}

function select(el) {
  if (answered) return;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function submit() {
  if (answered) return;
  const q = questions[current];
  const isGrid = !!q.grid;
  answered = true;
  stopTimer();

  if (isGrid) {
    if (gridInput.length < q.grid.slots) { answered = false; alert('请先填满所有格子'); return; }
    const userAns = gridInput.join('');
    const isOk = userAns === q.answer;
    results[current] = isOk;
    document.querySelectorAll('.grid-slot').forEach(s => s.classList.add(isOk ? 'correct' : 'wrong'));
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.add('disabled'));
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : `❌ 回答错误，正确答案是：${q.answer}`;
  } else {
    const selected = document.querySelector('.option.selected');
    if (!selected) { answered = false; alert('请选择一个答案'); return; }
    const chosen = selected.dataset.letter;
    const correct = q.answer;
    document.querySelectorAll('.option').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === correct) o.classList.add('correct');
      else if (o.dataset.letter === chosen) o.classList.add('wrong');
    });
    const isOk = chosen === correct;
    results[current] = isOk;
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : `❌ 回答错误，正确答案是 ${correct}`;
  }

  document.getElementById('analysis').classList.add('show');
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
  const timerEl = document.getElementById('timer');
  if (timerEl) timerEl.style.display = 'none';
  updateNav();
}

function next() {
  stopTimer();
  current++;
  if (current >= questions.length) {
    const correct = Object.values(results).filter(v => v === true).length;
    const total = questions.length;
    document.getElementById('progress').textContent = '';
    document.getElementById('card').innerHTML = `
      <div class="finish">
        <h2>🎉 全部完成！</h2>
        <p>共 ${total} 题，答对 ${correct} 题，答错 ${total - correct} 题</p>
        <p>正确率：${Math.round(correct/total*100)}%</p>
      </div>`;
    updateNav();
  } else {
    render(current);
  }
}

function downloadResults() {
  const now = new Date();
  const dateStr = now.toLocaleString('zh-CN');
  const data = questions.map((q, i) => {
    const t = timings[i] || {};
    return {
      题号: q.num,
      题型: q.type,
      题干: q.stem,
      正确答案: q.answer,
      结果: results[i] === true ? '正确' : results[i] === false ? '错误' : '未作答',
      用时秒: t.elapsed ?? '-',
      超时: t.timeout ? '是' : '否',
    };
  });
  const correct = Object.values(results).filter(v => v === true).length;
  const output = {
    答题时间: dateStr,
    总题数: questions.length,
    答对: correct,
    答错: questions.length - correct,
    正确率: Math.round(correct / questions.length * 100) + '%',
    明细: data,
  };
  const blob = new Blob([JSON.stringify(output, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `答题记录_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

buildNav();
render(0);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
