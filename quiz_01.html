<html lang="zh">
<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: #f5f5f5; color: #333; min-height: 100vh; }
  .layout { display: flex; max-width: 1200px; margin: 0 auto; padding: 12px 8px; gap: 12px; }
  .sidebar { width: 330px; flex-shrink: 0; }
  .sidebar-title { font-size: 13px; color: #888; margin-bottom: 8px; padding: 0 4px; }
  .btn-download { width: 100%; margin-top: 12px; padding: 10px; background: #1976d2; color: #fff;
                   border: none; border-radius: 8px; font-size: 14px; font-weight: 600;

  .btn-download:hover { background: #1565c0; }
  .nav-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .nav-btn { padding: 12px 0; border: none; border-radius: 6px; font-size: 15px;
              cursor: pointer; font-weight: 500; background: #e0e0e0; color: #555;
              transition: all 0.15s; }
  .nav-btn:hover { background: #bdbdbd; }
  .nav-btn.active { outline: 2px solid #1976d2; }

  .nav-btn.wrong { background: #e53935; color: #fff; }
  .main { flex: 1; min-width: 0; }

  .card { background: #fff; border-radius: 12px; padding: 24px;

  .tag { display: inline-block; font-size: 12px; padding: 2px 10px;
          border-radius: 20px; background: #fff3e0; color: #e65100; margin-bottom: 14px; }
  .stem { font-size: 17px; line-height: 1.7; margin-bottom: 20px; font-weight: 500; }

  .option { display: flex; align-items: center; padding: 12px 16px; border-radius: 8px;
             border: 1.5px solid #e0e0e0; cursor: pointer; font-size: 15px;
             transition: all 0.15s; user-select: none; }
  .option:hover:not(.disabled) { border-color: #1976d2; background: #e3f2fd; }
  .option.selected { border-color: #1976d2; background: #e3f2fd; }
  .option.correct { border-color: #43a047; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
  .option.wrong { border-color: #e53935; background: #ffebee; color: #c62828; }
  .option.disabled { cursor: default; }
  .option .label { font-weight: 600; margin-right: 10px; min-width: 24px; }
  .btn-row { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px;
          cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-submit { background: #1976d2; color: #fff; }
  .btn-next { background: #43a047; color: #fff; }
  .btn-submit:hover:not(:disabled) { background: #1565c0; }
  .btn-next:hover:not(:disabled) { background: #388e3c; }
  .result { margin-top: 16px; padding: 14px 16px; border-radius: 8px;
             font-size: 15px; display: none; }
  .result.show { display: block; }
  .result.ok { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }
  .result.fail { background: #ffebee; color: #c62828; border-left: 4px solid #e53935; }
  .analysis { margin-top: 16px; background: #f9f9f9; border-radius: 8px;
               padding: 16px; font-size: 14px; line-height: 1.8; display: none;
               white-space: pre-wrap; color: #555; }
  .analysis.show { display: block; }
  .analysis-title { font-weight: 700; font-size: 15px; color: #333; margin-bottom: 8px; }
  .finish { text-align: center; padding: 40px 0; }
  .finish h2 { font-size: 24px; color: #1976d2; margin-bottom: 8px; }
  .finish p { color: #666; font-size: 15px; margin-bottom: 8px; }
  .timer { display: inline-block; font-size: 13px; font-weight: 600; padding: 2px 10px;
            border-radius: 20px; background: #e3f2fd; color: #1976d2; margin-left: 10px; }
  .timer.warning { background: #fff3e0; color: #e65100; }
  .timer.danger { background: #ffebee; color: #c62828; }
  .question-img { display: block; max-width: 50%; border-radius: 8px;
                   margin: 0 auto 20px; }

  /* 宫格样式 */
  .grid-wrap { margin-bottom: 20px; }
  .grid-slots { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
  .grid-slot { width: 52px; height: 52px; background: #e53935; border-radius: 8px;
               display: flex; align-items: center; justify-content: center;
               font-size: 22px; font-weight: 700; color: #fff; cursor: pointer;
               border: 2px solid #c62828; transition: all 0.15s; }
  .grid-slot.filled { background: #c62828; }
  .grid-slot.correct { background: #43a047; border-color: #388e3c; }
  .grid-slot.wrong { background: #e53935; border-color: #c62828; animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .grid-candidates { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .grid-row { display: flex; gap: 6px; }
  .grid-cell { width: 52px; height: 52px; background: #f5f5f5; border-radius: 8px;
               display: flex; align-items: center; justify-content: center;
               font-size: 22px; font-weight: 700; color: #333; cursor: pointer;
               border: 2px solid #e0e0e0; transition: all 0.15s; user-select: none; }
  .grid-cell:hover:not(.used):not(.disabled) { background: #e3f2fd; border-color: #1976d2; }
  .grid-cell.used { opacity: 0.3; cursor: default; }
  .grid-cell.disabled { cursor: default; }
</style>

？", "options": ["A.一种", "B.两种", "C.三种"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友你好呀！我是你的诗词伙伴，咱们又见面\n啦～看到这个问题，是不是觉得有点小迷糊？别\n担心，我们一起来当一回诗句里的小侦探，把藏\n若的乐器都找出来！\n我们先来还原一下这句诗的场景：“我有嘉宾\n鼓瑟吹笙。“想象你在一个远古的大厅里，主人\n热情地说：“我家里来了尊贵的客人啦！“然后\n呢，他要用音乐来欢迎客人。你竖起耳朵一听，\n听到两种美妙的声音：一种是手指在好多根弦上\n弹拨出的悠扬琴声，那是什么？那是“瑟”；另一\n种是嘴巴对着吹孔，发出清脆和声的管状乐器\n那是什么？那是“笙”。\n所以呀，这句话里“鼓“和“吹“都是演奏的动\n作，“鼓瑟“就是弹奏瑟，“吹笙“就是吹奏笙。这\n里明明白白地提到了“瑟”和“笙”两种乐器。有\n些小朋友可能会把“鼓“也当成乐器，以为“鼓”是\n大鼓，其实这里的“鼓“是动词，表示弹奏”，并\n不是敲的鼓哦。这就是最容易掉进去的小陷阱\n啦！\n你想啊，如果“鼓“是乐器，那“鼓瑟“不就成了“鼓\n和瑟“两种乐器了吗？但这样就说不通啦，因\n为“鼓瑟吹笙“是主人家的乐师在表演，总不能手\n里同时敲着鼓又弹着瑟吧？所以，正确思路是：\n锁定瑟“和“笙“这两个乐器名词，把“鼓“和\"吹“看\n作动作。答案就是B.两种。\n记住这个小窍门：读到描写音乐的诗词时，先找\n具体的乐器名称，再看看前面有没有动词来帮\n忙，这样就不会被“扮成乐器的动作“给骗啦！你\n今天的思考非常棒，敢于提问就是在进步。下次\n见到“琴瑟”笙箫“这样的朋友，我们一定能一眼\n认出来，对吗？继续加油！\n试题解析：\n鼓瑟“字面意思就是弹奏瑟。\n---", "grid": null, "image": null}, {"num": 4, "type": "单选题", "stem": "《山居秋暝》是王维写的关于山村生 活的诗，从体裁上说，这首诗属于什 么类型？", "options": ["A.咏物诗", "B.律诗", "C.田园诗", "D.绝句"], "answer": "B", "analysis": "AI解析（仅供参考）：\n同学你好呀！别灰心，这道题确实藏着一个很容\n易让人“掉坑“的小陷阱，很多小朋友第一次做都\n会选错。来，咱们一起把它弄明白！\n先走进这幅”画“里看一看\n想象一下，刚下过雨的秋天傍晚，王维爷爷在山\n里散步。空气凉凉的，月光洒在松林间，还能听\n到泉水在石头上叮咚作响。这画面是不是很美，\n很有田园生活的味道？\n精准破题：为什么容易选C？\n这道题的“坑”，在于混淆了**写什么“和“是什\n么\n·你的思路（推测）：诗里写了山、秋天、\n村庄生活一所以是田园诗。\n哪里错了：“田园诗“是按内容题材分的，\n就像说“科幻片“是按故事类型分的：但题\n目问的\"体裁”，是指这首诗的格式\"和“结\n构”，就像问这部电影是“2D动画“还是“真\n人版。\n正确路径：我们来给这首诗量一量“尺\n寸。\n1.数句子：全诗一共8句。\n2.数字数：每句5个宇。\n3.看对仗：领联（第三四句）“明月松间照\n清泉石上流”，颈联（第五六句）“竹喧归\n浣女，莲动下渔舟“都是工工整整的对联！\n4.结论：这种严格遵循8句、每句5个字、讲\n究对仗和平仄的格式，学名就叫五言律\n诗。\n所以正确答案是B.律诗哦！\n举一反三：记住这个小窍门！\n下次再碰到问“体裁“的题，就像查户口一样去读\n诗：\n·先数宇：共4句的是“绝句”，共8句的是“律\n诗。\n再看字：每句5个字是“五言”，7个字是“七\n言”。\n内容和体裁是两码事，就像说这是一只可\n爱的田园犬”，但它的品种其实是“柯\n基“呀！\n别小看这道题，它让你发现了区分形式“和内\n容“的窍门，这可是个了不起的进步！你离古诗\n小达人又近了一步，继续加油！\n试题解析：\n《山居秋》\n作者：王维\n朝代：唐代\n空山新雨后，天气晚来秋。\n明月松间照，清泉石上流。\n竹喧归浣女，莲动下渔舟。\n随意春芳歇，王孙自可留。\n赏析：\n这首诗为山水名篇，于诗情画意之中寄托着\n---", "grid": null, "image": null}, {"num": 5, "type": "单选题", "stem": "____戏蝶时时舞，自在娇莺恰恰啼。", "options": ["A.流恋", "B.流连", "C.留恋", "D.留连"], "answer": "D", "analysis": "AI解析（仅供参考）：\n小朋友，别担心，这道题很多小伙伴都会掉进这\n个小陷阱里呢！来，跟老师一起，我们把这句\n诗变回一干多年前那个春光灿烂的午后，好吗？\n一、走进诗里的画面\n想象一下，杜甫爷爷漫步在江边，花开得正热\n闹。他看到几只彩蝶在花丛里玩要，飞飞停停，\n好像特别舍不得离开。这时候，他听到藏在树叶\n里的黄鸢也开始唱歌了，那声音清脆又自在。\n二、精准破题：小坑在哪里？\n你瞧，选项里这几个词长得太像了，但这里有一\n个很重要的汉字小秘密。\n1.你容易掉进的误区'：\n看到蝴蝶不想离开，我们很容易想到留恋这个\n词，因为它们现代汉语里经常一起用。或者联想\n到成语流连忘返，就想选流恋或流连。\n2.正确的路径是这样走的：\n这句诗出自杜甫的《江畔独步寻花》，原诗写的\n是“留连戏蝶时时舞”。\n·留：是留下的意思。\n连：是连接、舍不得断掉。\n你可以这样记：花儿太香了，不仅把蝴\n蝶留住了，还把这份快乐连续了好久。\n三、考考你，记住小窍门\n那么，如果下次再遇到这种古诗填写，我们要怎\n么做呢？对啦！要尊重古诗词的原文，不能只凭\n我们现在说话的习惯去猜哦！\n四、正确答案\n所以，这道题的正确答案是D.留连。\n记住，学古诗就像当一名小侦探，只要身临其境\n去感受，再小心的避开现代词语习惯这个迷雾\n弹，你就一定能找到答案！你真棒，继续加油！\n试题解析：\n《江畔独步寻花·其六》\n作者：杜甫\n朝代：唐代\n黄四娘家花满蹊，千朵万朵压枝低。\n留连戏蝶时时舞，自在娇莺恰恰蹄。\n赏析：\n这首记叙在黄四娘家赏花时的场面和感触，描写\n草堂周围烂漫的春光，表达了对美好事物的热爱\n之情和适意之怀。春花之美、人与自然的亲切和\n谐，都跃然纸上\n白话文：\n黄四娘家周围的小路旁开满了鲜花，千朵万朵鲜\n花把枝条都压得低垂了。\n蝴蝶在花丛中恋恋不舍地盘旋飞舞，自由自在的\n小黄莺在花间不断欢唱。\n---", "grid": null, "image": null}, {"num": 6, "type": "十二宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "零落成泥碾作尘", "analysis": "AI解析（仅供参考）：\n小朋友，别灰心哦～这道找诗句“的小难题，其\n实是在考我们对古诗的熟悉度和火眼金睛呢！\n®\n咱们先来看看这些字宝宝：落、一、碾、子、\n尘、成、作、红、泥、妃、零、骑。乍一看乱糟\n糟，但如果你脑海里有一首陆游的《卜算子咏\n梅》，马上就会发现一有好几个熟恶的字眼在\n朝你招手呢！\n场景还原：\n想象一下，在寒冬的驿站外，断桥边，梅花独自\n开放。可它们太寂寞了，黄昏时又遭风雨摧残。\n花瓣零零散散地飘落，等花落了，被过往的车马\n碾碎，混进泥土里，最终化作了飘浮的灰尘\n这就是“零落成泥碾作尘“的画面。\n精准破题：\n哪里容易错？很多同学一眼看\n到“妃”红”骑”，可能会联想到”一骑红尘妃\n子笑”，但是“子“和“笑“又对不上。其实题\n目里多出来的字就是用来迷惑你的！\n正确路径：只要\n把“零“落”“成”泥”碾作”尘\"按顺序挑出\n来，正好组成陆游词里的名句。你看，一\n个不多，一个不少！\n★举一反三小窍门：\n以后遇到这种“字堆里找诗句”，可以先认\n准两三个关键词（比如“碾”尘“落\"），再\n去回忆学过的含有这些字的诗，就像拼图\n一样，一下子就能拼完整！\n你已经很努力地思考了，继续加油，你会\n成为背诵小达人的！\n试题解析：\n《卜算子-驿外断桥边》\n作者：陆游\n朝代：宋代\n驿外断桥边，寂寞开无主。\n已是黄昏独自愁，更著风和雨。\n无意苦争春，一任群芳妒。\n零落成泥碾作尘，只有香如故。\n赏析：\n白话文：\n---", "grid": {"slots": 7, "rows": [["落", "一", "碾", "子"], ["尘", "成", "作", "红"], ["泥", "妃", "零", "骑"]]}, "image": null}, {"num": 7, "type": "单选题", "stem": "下面的图片描述的是一首诗，这首诗的题目是____", "options": ["A.《过零丁洋》", "B.《赋得古原草送别》", "C.《秋词·其一》", "D.《酬乐天扬州初逢席上见赠》"], "answer": "C", "analysis": "试题解析：\n《秋词》\n作者：刘禹锡\n朝代：唐代\n自古逢秋悲寂寥，我言秋日胜春朝\n晴空一鹤排云上，便引|诗情到碧霄\n赏析：\n刘禹锡的《秋词》，一反常调，另辟蹊径，它\n以其最大的热情这歌了秋天的美好\n更为难得可贵的是，《秋词》还是诗人被贬朗州\n后的作品，让人佩服刘禹锡的待人处世\n原诗两首，这是其第一首\n自古逢秋悲寂廖，我言秋日胜春朝\n自宋玉于《九辩》中留下“悲哉，秋之为气\n也的名句后，悲，就成了秋的一种色调，一种\n情绪；愁，也就成了心上的秋了\n然而，诗人开篇，即以议论起笔，断然否定了前\n人悲秋的观念，表现出一种激越向上的诗情\n我言“说出的是诗人的自信，这种自信，尽管染\n上的，是一种不幸的色彩，然而，诗人阔大的胸\n襟却非凡地溶解了这种不幸\n胜春朝就是诗人对于秋景最为充分的认可\n这种认可，绝非仅仅是一时的感性冲动，而是融\n入了诗人对秋天的更高层次的理性思考\n白话文：\n自古以来每逢秋天都会感到悲凉寂寥，我却认为\n秋天要胜过春天\n万里晴空，一只鹤凌云而飞起，就引发我的诗兴\n到了蓝天上了\n---", "grid": null, "image": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAqYAAALgCAYAAABGerXuAAAACXBIWXMAABJ0AAASdAHeZh94AAAAB3RJTUUH6gUbBgAzj67QDgAAIABJREFUeJzMvdvO7EqvHUZqbdvI4Sp5/ydMLgwECGJvTzEXxcMYJKXunr8dpNaaX6ulOpAscpBildRqZiYPxe5/F/vz/4j9+/8l93/9P8X+/T+L3P9NTFTERExEzExURFRVRFXETMxMRqfbuZeiIqe/H+urH5v/q2sCV+DY6oxFKxq2vpjs9KionP+vOglitfyTQ56eLhXVyz/PPzOTP/ctdt/SZybqKMjlZfpmO9GcJzOR+77lvr+fFXUZ6g/zUo3PnzPaMqbPXS9Hdq5TzquqynVdr3SkPiTvPk/ea4hNSzn2fvD6VnfIX4+eqIiYAv3JjTD/Oodn4kb/dNpEbu//NpPbQPNTpjqGQXsZsje2i6DH4BjHFzFRV+pvtUnHN3O7UDjrmJK0Ox1qVf9xOuzhGEZ9sHO+rmekD4ylniStY1LHWA6XbMNAMzZROTZbc2WLzZQcS+dW1tpp1qmw0kPCm42hnoOOJ+maNWfbwlnz/44S9T6M8Jux3GuDbWlNQKfU5yakFzbiH9quh86b5fxbYrdSXVZ8v5ZYefCqOFPwTaApu2uaJfyoOQ+LYiMu5rFp0n2FTWl5yoOvxx/cdh9KtdoXeaceybDEGOZ61POW9McfDSidIthldJTYj84TKrsOionI/T7MWvRN4B+ITry9y44TflkXKSLAAAWZ/2LI8+lzdoNv9G6Oz4vxm78emFA+sXSqqh+78Fm8gB8L3pX7SpUKmoCurHsmSf/tfxL9T/+7XP/xfxP5t/9Z9J//KKL/iIjIv71KwG6R+9/F/vzfYv/1P8v9X/4Psfu/iMh1wCgGzwAAgNas87xJ5UHqBdxfT5i3J6cA4PDYTwbMDo9qrQIA4AqwBVKql6Rz6DHIpvcRzGOgKUKKZlQVA9MAnF8D/oCJAFMdZvHUYwS2Pwem4eADaOpkjjicemJFGV4a37fDOgirXuBCvqEdUbI5InSQ4EDNjfTwePnVcHJgE+AQk5Z+o5G2U0avSZIiaTkO4tzqPJu/Zr09dCsGFg4u58wOWjGY/qiDQePzeXVf48Aqx++omPufCmIMBZHkA70i5MxBAIzN1vQCZSdLe2wrLM+k6YnJVO8I6IwnL+mOc3CDATwX2azVGExthSww5AvnaDZtx73TFMIOuPmqWAlw6qnETYZGRDF1rtReWd4iD/Oq2ce03SYJNEHFGReJ4L4wSFL4hIOkhJpsd7wsO9Xjmpt9tkkgOdD5wBMpmW/8F06rs+q2fmlzOx6U2i33n1vu+xbRCkzROx3duiWTOEBajKkiJyi9D5CAloDsi8mQNcArzFUENzZlIXqSOlH5FskAVfyYDasV1olvkjzcOui6RTyYLxoVgjoYoxwGkPUpLqIOitbb5L5vCk4zRoBkFyYNP/KffqquZ/tUmqgnOPE1Jx4w1w1FVAlb+HO+/4f/VS79j6L//C+i//wn8HuvgSlIIoV3AzFhYgKfYDn+Le4a6sxbUWIWwfi7gnfUePqtD3X3EFXxmwgqjRrORJxG8IP6gwY 代：宋代\n京口瓜洲一水间，钟山只隔数重山。\n春风又绿江南岸，明月何时照我还？\n赏析：\n这是一首苦名的抒情小诗，抒发了诗人跳望江\n南、思念家乡的深切感情。\n本诗从字面上看，是流露着对故乡的怀念之情，\n大有急欲飞舟渡江回家和亲人团聚的愿望。其\n实，在字里行间也寓着他重返政治舞台、推行新\n政的强烈欲望。\n诗人回首江南，大地一片翠绿，这固然是春风吹\n绿的，但是那葱绿的禾苗难道不是变法措施产生\n的实效吗？但是官场是险象环生的，诗人望着\n这瓜洲渡口，也望着钟山的明月，发出了“明月\n---", "grid": null, "image": null}, {"num": 10, "type": "单选题", "stem": "杨花落尽子规啼，____龙标过五溪。", "options": ["A.听闻", "B.耳闻", "C.闻到", "D.闻道"], "answer": "D", "analysis": "AI解析（仅供参考）：\n哎呀，我看到这道题了！先别急着懊恼，古诗词\n有时候就像个调皮的小精灵，一不留神就给我们\n设了个小陷阱。来，咱们一起当一回“诗境\n侦探”，把这个空补得妥妥的。\n你闭上眼睛想象一下这个画面：暮春时节，杨花\n像雪花一样飘零，杜鹃鸟（子规）悲切地叫着\n好像在说“不如归去”。这时候，诗人李白突然得\n知了一个消息——他的好朋友王昌龄要被贬到遥\n远的龙标（就是现在的湖南洪江一带）去当个小\n官了。朋友要走那么远的路，李白的心啊，一下\n子就揪紧了。\n现在，回到诗句”\n龙标过五溪”。你觉得李\n白是怎么知道这个消息的呢？\n咱们看看选项：“听闻”、“耳闻”、“闻到”、“闻\n道”。你是不是可能选了“闻到？很多小朋友会\n想：“间“就是用鼻子间嘛，这句诗里会不会是什\n么特殊用法呢？这是个特别可爱的错误！其实在\n古汉语中，“闻“除了表示鼻子的噢觉，更常常\n指“用耳朵听到”。但这里的关键词是“道”——\"闻\n道“连起来，意思是“听说“或“听到..的消息”。\n如果只填“听闻“或“耳闻”，虽然意思差不多，但\n诗句的节奏就乱了，古诗很讲究字数和平仄的。\n而“间道恰恰是那个最贴切的词，它带出一种“忽\n然听说“的意外和担忧。整句连起来：“杨花落尽\n子规蹄，闻道龙标过五溪。“你看，先写悲伤的\n景色，再写悲伤的消息，情景交融，多妙啊！\n所以正确答案是D.闻道。\n举一反三小窍门：以后遇到“间“字当选项\n时，先想想它后面有没有跟一个道“字，或者是\n不是在表示“听消息“的语境里。在古诗文\n中，“闻”更多时候是“用耳朵听“而不是“用鼻子\n噢“哦。这个小窍门记住了，下次就不会掉进同\n一个“坑\"啦！\n你看，你并不是不会，只是还没和闻道小朋友\n交上好朋友。现在认识了，以后它们就是你的诗\n词小助手了！继续加油，大语文的世界藏着无穷\n无尽的乐趣，你每多问一个问题，就多了一份智\n慧的光芒。\n试题解析：\n《闻王昌龄左迁龙标遥有此寄》\n作者：李白\n朝代：唐代\n杨花落尽子规啼，闻道龙标过五溪。\n我奇愁心与明月，随君直到夜郎西。\n赏析：\n这是一首短短四句的抒情短章，感情的分是却相\n当沉重。\n它一开头便择取两种富有地方特征的事物，描绘\n出南国的暮春景象，烘托出一种哀伤愁侧的气\n氛。杨花即柳絮。\n白话文：\n在杨花落完，子规啼鸣的时候，我听说您被贬为\n龙标尉，龙标地方偏远要经过五溪。\n---", "grid": null, "image": null}, {"num": 11, "type": "单选题", "stem": "敲成____穿林响，忽作玻璃碎地声。", "options": ["A.钰馨", "B.玉馨", "C.钰钲", "D.玉钲"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友，别灰心哦！这道题很多小伙伴第一次都\n会掉进“字音字形“的小陷阱里，我们来一起把它\n破译掉吧~\n场景还原：冬天的清晨，一个小朋友把铜盆\n里冻的冰块取出来，用彩线穿起来当银敲。那\n声音清脆又响亮，穿过树林，就像敲击玉馨一样\n悦耳。忽然冰块摔落，发出玻璃破碎般的声音\n原来，这冰玩具这么美又这么易碎呀！\n精准破题：你选错，很可能是因\n为”玉“和“钰“分不清，或者不知道“碧“是什么。\n错误点：A/C项里的钰虽然也是珍宝的意\n思，但古诗中形容乐器声清越，因定用“玉\n馨”，就像“玉笛玉箫”一样，是文学意\n象，而不能用“钰”。C/D项的“\"是另一种\n古代乐器，形状像钟，但《稚子弄冰》原\n句就是“玉”，我们要尊重原文。\n正确路径：这句诗出自杨万里的《稚子弄\n冰》。原句是“敲成玉馨穿林响”。想象一\n下，冰敲起来的声音，是不是像玉石做的\n整那样清透？所以正确选项是B.玉馨。\n举一反三小窍门：遇到古诗词填空，如\n果选项有“玉“和\"钰”，99%都是“玉”，因\n为”玉“常用来形容美好、高洁的声音或物\n品，是诗人的宠儿。下次记得先想想常见\n的”玉笛”\"玉壶“哦！\n你离小诗仙又近了一步，继续带看想象力\n去读诗吧，加油！\n试题解析：\n《稚子弄冰》\n作者：杨万里\n朝代：宋代\n稚子金盆脱晓冰，彩丝穿取当银。\n敲成玉馨穿林响，忽作玻璃碎地声。\n赏析：\n全诗摄取瞬间快景避开直接描写，用生动形象\n的“穿林“响声和贴切的比喻，用老者的眼光开掘\n稚子的情趣。\n诗中孩子弄冰的场景，充满了乐趣：心态上，寒\n天“弄冰”，童心炽热：色泽上，“金“盘“彩\"丝\n串“银“冰；形态上，是用“金盘“脱出的“银”\n圆形：声音上，有“玉馨穿林响“的高亢，忽又转\n作“玻璃碎地声“的清脆。\n全诗形色兼具以感目，声意俱美以悦耳赏心，绘\n声绘色地表现出儿童以冰为、自得其乐的盏然\n意趣。全诗突出一个“稚“字。\n稚气和乐趣能使儿童忘却严冬的寒冷，保持他一\n如既往的活力和快乐。\n白话文：\n一个小孩子，早上起来，从结有坚冰的铜盆里刺\n冰，用彩丝穿起来当证来敲。\n敲出的声音像玉整一般穿越树林，突然冰落在地\n上发出玻璃一样的碎裂声。\n---", "grid": null, "image": null}, {"num": 12, "type": "单选题", "stem": "京口瓜洲一水间，____只隔数重山。", "options": ["A.钟山", "B.终山", "C.中山", "D.众山"], "answer": "A", "analysis": "AI解析（仅供参考）：\n哎呀，小朋友你别急，这道题可是好多同学都会\n掉进去的“小陷阱“呢！咱们先来做个深呼吸，把\n它变成一个小故事好不好？\n想象一下，大诗人王安石站在长江边的瓜洲渡\n口，远远地望着对岸的京口（就是现在的镇\n江）。他好想家呀，心里念叨着：“虽然隔着滔\n滔江水，可是那熟悉的钟山，也只隔了几座青山\n而已呀！“这里的“钟山\"不是随便哪座山，而是\n他心心念念的故乡—\n一南京紫金山的别称，那是\n他瑰牵梦绕的家。\n我们来看看你踩到的小水坑\n你可能听到“只隔数重山”，觉得是“重重叠叠的\n山”，就手一滑选了“众山\"或者发音像的“终山”。\n可是呀，古诗里提到具体地名时，往往藏着诗人\n最柔软的情感。王安石退休后就住在钟山脚下，\n所以他才说“钟山只隔数重山，那是一种“其实离\n家很近，只差最后一步“的温暖思念。如果换\n成“众山”，就变成冷冰冰的“好多山”，一点儿也\n不深情啦。\n来，咱们像侦探一样破案\n1.回忆标题—《泊船瓜洲》，诗人渴望回\n到的是钟山的家。\n2.联想古人用地名的习惯，就像李白总爱\n写“峨眉山月”，因为那是他家乡的月。这\n里的“钟山“就是王安石的“家“的符号。\n3.辨别读音和字形：钟，是“钟爱“的钟，不\n是“终点“的终，也不是“众多“的众。\n送你一个小口诀，从此不迷路\n泊船思乡望钟山，具体地名画面现。谐音\n别字不随便，诗人心意记心间。“\n看，现在你是不是觉得，这道题其实是一\n封藏在风景里的家书呢？下次再遇到地名\n填空，你就先想想：诗人最牵挂的是哪片\n山水？这样，无论题目怎么变幻，都难不\n倒你啦！继续加油，小才子/小才女！\n试题解析：\n《泊船瓜洲》\n作者：王安石\n朝代：宋代\n京口瓜洲一水间，钟山只隔数重山。\n春风又绿江南岸，明月何时照我还？\n赏析：\n这是一首著名的抒情小诗，抒发了诗人跳望江\n南、思念家乡的深切感情。\n本诗从字面上看，是流露着对故乡的怀念之情，\n大有急欲飞舟渡江回家和亲人团聚的愿望。其\n实，在字里行间也寓着他重返政治舞台、推行新\n政的强烈欲望。\n诗人回首江南，大地一片翠绿，这固然是春风吹\n绿的，但是那葱绿的禾苗难道不是变法措施产生\n的实效吗？但是官场是险象环生的，诗人望着\n这瓜洲渡口，也望着钟山的明月，发出了“明月\n何时照我还“的概叹，诗人是想早点离开是非黑\n---", "grid": null, "image": null}, {"num": 13, "type": "单选题", "stem": "《西江月·夜行黄沙道中》中\"路转溪 桥忽见\"中的\"见\"是什么意思？", "options": ["A.出现", "B.看见", "C.见到", "D.发现"], "answer": "A", "analysis": "AI解析（仅供参考）：\n亲爱的同学，别因为这道题皱眉头哦，咱们一起\n来把这首词变成一幅画，下次你就再也不会弄错\n啦！\n想象一下：夏夜，辛弃疾爷爷走在黄沙岭的小路\n上，他记得以前这附近有个小茅屋可以歌脚，可\n天太黑了，怎么找也找不到。正着急呢，他走过\n小溪上的石桥，顺着小路拐了个弯一一哇！那座\n熟悉的茅店***忽然就出现在眼前***，就像变\n魔术一样！\n这里的**“见\"**，正是“出现\"的意思。在古代\n它经常被写成“见“字，读作*xian*，是个通\n假宇。诗人不是主动睁大眼睛去“看见“它，而是\n茅店自己“蹦“到了他面前，所以不能选“看\n见“哦。\n很多小朋友会出错，就是因为我们平时看\n到见”，第一反应总是“看见”，忽略了这里面藏\n着的小小惊喜感。你看，用一个见“字，是不是\n比直接说“我看见茅店了“更有画面感，也更能表\n达出那种突然发现的快乐？\n**小小窍门**：以后读古诗，如果碰\n到见“字，你就在心里问一句一是有人主动去\n看，还是什么东西自己冒出来了？如果它后面跟\n着的景物是忽然出现的，那很可能是通假\n字现”，读xian，表示显现、出现。\n你瞧，掌握这一个规律，再遇到风吹草低见牛\n羊“这样的诗句，你就能脱口而出啦！继续加\n油，你离古诗词小达人又近了一步！\n试题解析：\n《西江月·夜行黄沙道中》\n作者：辛弃疾\n朝代：宋代\n明月别枝惊鹊，清风半夜鸣蝉。稻花香里说丰\n年，听取蛙声一片。\n七八个星天外，两三点雨山前。旧时茅店社林\n边，路转溪桥忽见。\n赏析：\n从《西江月》前两句“明月别枝惊，清风半夜\n鸣蝉“表面看来，写的是风、月、蝉、鹊这些极\n其平常的景物，然而经过作者巧妙的组合，结果\n平常中就显得不平常了。\n鹊儿的惊飞不定，不是盘旋在一般树头，而是飞\n绕在横斜突兀的枝干之上。\n因为月光明亮，所以鹊儿被惊醒了：而儿惊\n飞，自然也就会引起“别枝“摇曳。同时，知了的\n鸣叫声也是有其一定时间的。夜间的鸣叫声不同\n于烈日炎炎下的断鸣，而当凉风徐徐吹拂时，往\n往特别感到清幽。总之，“惊鹊“和“鸣蝉“两句动\n中寓静，把半夜“清风”、“明月“下的景色描绘得\n令人悠然神往。\n白话文：\n天边的明月升上了树梢，惊飞了栖息在枝头的喜\n鹊。清凉的晚风仿佛传来了远处的蝉叫声。\n---", "grid": null, "image": null}, {"num": 14, "type": "十二宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "山下兰芽短浸溪", "analysis": "AI解析（仅供参考）：\n哇，同学你好呀！别担心，这种“字海寻诗的题\n目就像捉迷藏，咱们一起来把淘气的字宝宝排排\n队，就一定能找到那句诗！\n来，先闭上眼晴，听老师讲个小故事：春天来\n了，诗人在山脚下散步，看到游游的溪水浅浅\n的，刚刚没过兰草的嫩芽，那芽儿短短的、嫩嫩\n的，像刚睡醒的小宝宝，在清凉的溪水里“泡\n脚~呢！\n现在睁开眼，咱们用“画面记忆法“来拼句子。你\n找找看，这里有”山”下\"兰”芽”短”\"浸\"溪“对\n不对？把它们按故事里的顺序串起来——山下兰\n芽短浸溪。没错，这就是苏轼《浣溪沙》里描写\n早春的妙句！其余那些只、钟、隔、数呀，都\n是小干扰，千万别被它们晃晕啦。\n你的小困惑，老师懂：\n你可能错在把“山下“看成”下只山”，或者觉得“溪\n浸“才通顺。但古诗讲究平仄和意境，这里要读\n成山下/兰芽/短浸溪”溪水只是刚刚浸过芽\n尖，不是“浸泡“整个芽，所以\"短浸溪“才那么灵\n动呀。下次遇到这种题，记得先找名词（山、\n溪、兰芽）搭骨架，再找动词（浸）添血肉，顺\n序自然就出来啦！\n记住这个小窍门：“名词找朋友，动词定先后\n画面申一串，好诗顺口溜。“你已经很棒了，继\n续用想象力去拥抱诗词，你会成为小小诗仙的！\n试题解析：\n《浣溪沙·游蕲水清泉寺》\n作者：苏轼\n朝代：宋代\n山下兰芽短浸溪，松间沙路净无泥，萧暮雨子\n规啼。\n谁道人生无再少？门前流水尚能西！休将白发唱\n黄鸡。\n赏析：\n东坡为人胸襟坦荡旷达，善于因缘自适。\n他因诗中有所谓讥讽朝廷语，被罗织罪名入\n狱，“乌台诗案过后，于公元1080年（元丰三\n年）二月贬到黄州。\n这在苏轼的政治生涯中，是一个重大的打击。此\n词描写雨中的南方初春，表达作者虽处困境而老\n当益壮、自强不息的精神，洋溢着一种向上的人\n生态度。\n白话文：\n山脚下刚生长出来的幼芽浸泡在溪水中，松林间\n的沙路被雨水冲洗的一尘不染。傍晚，下起了小\n雨，杜鹃鸟的叫声从松林中传出。\n说人生就不能再回到少年时期？门前的溪水还能\n向西边流淌！不要在老年感叹时光的飞逝啊！\n---", "grid": {"slots": 7, "ro 物，而渔火醒目，霜寒可感；夜半乃\n闻寂之时，却闻乌啼钟鸣。如此明灭对照，无声\n与有声的衬托，使景皆为情中之景，声皆为意中\n之音，意境疏密错落，浑融幽远。一缕淡淡的客\n愁被点染得朦胧隽永，在姑苏城的夜空中摇曳飘\n忽，为那里的一桥一水，一寺一城平添了千古风\n情，吸引着古往今来的寻梦者。《唐诗三集合\n编》“全篇诗意自愁眠上起，妙在不说\n出。“《砂唐诗》：“对愁眠三字为全章关\n日胆逗一愁字虚写音夕光号掘转反侧之\n---", "grid": null, "image": null}, {"num": 21, "type": "单选题", "stem": "以下哪句诗体现了“读书明理”的道 理？", "options": ["A.读书破万卷，下笔如有神", "B.问渠那得清如许？为有源头活水来", "C.读书切戒在慌忙，涵泳工夫兴味长", "D.书中自有黄金屋"], "answer": "B", "analysis": "AI解析（仅供参考）：\n同学你好呀，是不是被这几个选项绕得有点迷糊\n啦？别急，咱们一起推开古诗的大门，把“读书\n明理这个小宝藏找出来！\n想象你面前有一方小小的池塘，水特别清澈，能\n看见池底圆润的鹅卵石。你问它：“你为什么这\n么清亮呀？“池塘笑眯眯地回答：“因为有源头的\n活水，一直咕嘟咕嘟地流过来呀。“—这句诗\n就是B.问渠那得清如许？为有源头活水来。\n这就是在告诉我们，读书就像那源源不断的活\n水，能让我们的心变得亮堂堂的，懂道理、有智\n慧。所以，体现“读书明理“的正是这一句哦！\n我们再来玩玩错题大侦探游戏，看看其他几句\n为什么不是最佳答案：\n·A.读书破万卷，下笔如有神：这句讲的是\n读了好多好多书之后，写起文章来就特别\n厉害，像有神仙帮忙一样。它强调的是“会\n写作\"，不是“明白人生道理”。\nC.读书切戒在慌忙，涵泳工夫兴味长：这\n是在教我们读书的好方法一—别看急，要\n像小鱼一样慢慢游，细细品味，才能尝到\n乐趣。它更多讲“读书方法”，还没直接落\n到明白道理这个结果上。\nD.书中自有黄金屋：古人为了鼓励读书\n说书里有黄金做的房子。这有点像说“读书\n能换好东西”，带有一些功利心，不是纯粹\n的“明理”。\n小技巧来啦：\n以后再看到关于“源头活水“的诗，你就在\n脑子里画一个小池塘。记住，“活水“往往\n比喻那些新鲜的知识和智慧的思想，它们\n就像清澈的溪流一样，能把我们的心灵洗\n得亮晶晶，这就是“明理“啦！\n你能靠自己的思考剖析到这里，真的非常\n了不起！继续保持这份探究的精神，古诗\n文里的宝藏会越来越多地朝你奔跑而来~\n试题解析：\n解释：朱熹《观书有感》中以源头活水“比喻读\n书明理的重要性。\n---", "grid": null, "image": null}, {"num": 22, "type": "单选题", "stem": "“走马观花\"这个成语出自下面哪首诗 作？", "options": ["A.《游子吟》", "B.《出塞》", "C.《登科后》", "D.《清平乐·村居》"], "answer": "C", "analysis": "AI解析（仅供参考）：\n哎呀，是不是被这个成语的题目绊了一小胶呀？\n没关系，咱们一起骑上“春风快马”，去把“走马\n观花”找回它的老家～\n你闭上眼，想象这样一个画面：\n有位大诗人头发都花白了，考了两次都落榜，这\n次终于金榜题名！他开心得像只从笼中飞出来的\n小鸟，骑着高头大马在长安街上狂奔，满城春\n花\"喻喻刷”从眼前飞过，他恨不得一天就把所有\n美景都看遍。这就叫—“春风得意马蹄疾，一\n日看尽长安花”。\n这首快活得快要飞起来的诗，就是孟郊的《登\n科后》。而“走马观花”就像个小尾巴，正是从\n这句诗里蹦出来的成语，原本专用来形容志得意\n满、游玩畅快的样子。\n那我们来看看，你最容易掉进去的小陷阱在哪儿\n呢？\n有的小朋友一看到孟郊，就想到他写过的《游子\n吟》，就错选了A。记住哦，《游子吟》里藏的\n是慈母手中的针线，是柔柔的母爱，可没有马蹄\n声和长安花。另外B是边塞的铁马，D是溪边\n的青草，都和“高中后的得意”不搭边。\n举一反三小窍门：\n下次再考成语出处，你可以当一回小侦探”：先\n问自己，这个成语“表情“是开心还是忧愁？“走马\n观花“脸上挂着大笑，肯定和庆贺、成功的场景\n有关。顺着心情去匹配诗歌的“情绪”，就绝不会\n迷路啦。\n你把这首诗轻轻念一遍，以后这道题就再也不敢\n欺负你了~你已经从“走马观花\"的小误区里跳出\n来，稳稳当当地骑在马背上看长安花啦！继续带\n着这种画面感，下一首诗也一定学得棒棒的。\n试题解析：\n《登科后》\n作者：孟郊\n 花，但“主人\"不一样。\n小窍门：抓诗眼“辨诗人\n杜甫的《江畔独步寻花》，“独步“说明他一个人\n散步，看到的是悠闲自在的寻常风景，感情是轻\n快又亲切的。你只要记住“黄四娘家花满蹊，千\n朵万朵压枝低。留连戏蝶时时舞，自在娇莺恰恰\n”这四句，抓住“黄四娘家“这个接地气的邻居\n名儿，还有“留连”“自在“那种快乐无忧的感觉，\n下次就不会再掉进坑里啦。\n你瞧，学古诗就像和诗人交朋友，多听他们讲讲\n那天发生的故事，朋友就不会认错啦。下次看\n到“留连戏蝶”，一定马上想到杜甫那张笑呵呵的\n脸，对不对？继续加油，你心里一定可以住下好\n多诗人朋友！\n---", "grid": null, "image": null}, {"num": 25, "type": "判断题", "stem": "“绿遍山原白满川，子规声里雨如 烟\"出自唐代翁卷的《乡村四月》。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友你好呀！咱们一起来当个小侦探，看\n看这道题的“真凶“是谁吧！\n这道题是：×错的。\n让我们像看电影一样，先走进这幅画里：连绵的\n山野绿油油的，白茫茫的水光映满了稻田，在蒙\n蒙细雨中，你听到了杜鹃鸟（也就是子规）在唱\n歌。哇，多美的乡村四月啊！\n这道题的“小尾巴“藏在哪里呢？藏在诗人的名字\n上。\n写这首诗的诗人确实是一位非常厉害的先生，但\n他不来自唐朝，而是南宋时期的一位诗人，名叫\n翁卷。\n很多小朋友会在这里“摔跟头”，是因为南宋和唐\n朝距离现在都很久远，容易把他们都归为“古\n代”。但南宋可比唐朝晚了好几百年呢！我们可\n以这样记：唐宋元明清，宋朝是排在唐朝后面\n的。翁卷先生是宋代人，所以不能叫他“唐代翁\n卷“哦。\n给你个小诀窍：\n下次再遇到这种题，可以把“朝代“和“诗人“想象\n成一对好朋友，名字和朝代必须手拉手，拉错了\n手可就要闹笑话啦！\n你很棒，敢于挑战这么细致的知识点，下一次一\n定会记得更牢固！加油！\n试题解析：\n《乡村四月》\n作者：翁卷\n朝代：宋代\n绿遍山原白满川，子规声里雨如烟。\n乡村四月闲人少，才了蚕桑又插田。\n赏析：\n这首诗以白描手法写江南农村（今乐清市淡溪\n镇）初夏时节的景象，前两句着重写景：绿原、\n白川、子规、烟雨，寥寥几笔就把水乡初夏时特\n有的景色勾勒了出来。\n白话文：\n山坡田野间草木茂盛，稻田里的水色与天光相辉\n映。天空中烟雨蒙蒙，杜鹃声声啼叫，大地一片\n欣欣向荣的景象。\n四月到了，没有人闲着，刚刚结束了蚕桑的事又\n要插秧了。\n---", "grid": null, "image": null}, {"num": 26, "type": "单选题", "stem": "\"但使龙城飞将在，不教胡马度阴山\"出自____的____。", "options": ["A.王翰：《凉州词》", "B.李白：《望天门山》", "C.李清照：《夏日绝句》", "D.王昌龄；《出塞》"], "answer": "D", "analysis": "AI解析（仅供参考）：\n小朋友，别灰心哦，这道题就像走迷官，一不小\n心拐错了弯，咱们一起把它抒清楚！\n我们先来“听”一下这句诗：“但使龙城飞将在，不\n教胡马度阴山。“读起来是不是特别豪迈？感觉\n像一位英勇的大将军，手握长枪，站在高高的城\n墙上，威风漂漂地说：“只要有我在，敌人休想\n跨过这座山半步！“\n这种保家卫国的气势，最容易让我们想到边塞\n诗。\n哪里容易理解错呢？\n很多小朋友会被A选项的王翰《凉州词》给“忽\n悠“啦。为什么呢？因为王翰也写过非常有名的\n边塞诗“葡萄美酒夜光杯”。两个诗人都是唐\n代写边塞诗的高手，名字里又都有个王“字，一\n不小心就“张冠李戴了。\n正确的路径是这样的：\n我们来找找这句诗里的\"小证据”。这里的”飞\n将“指的是汉代飞将军李广。而“龙城“也是抗击匈\n奴的北方重镇。能把汉代的典故用得这么自然\n这么有气魄的，正是被称为”七绝圣手“的王昌\n龄。这句诗就出自他的名篇*《出塞》**。\n举一反三小窍门：\n记住一个顺口溜：“王昌龄《出塞》望龙城，飞\n将李广守阴山。“王翰的《凉州词》忙着感叹“古\n来征战几人回”，而不是具体写某位将军守关口\n哦。\n你瞧，把诗人的名字和诗里的“标志性景点“或”人\n物挂钩，是不是就清晰多啦？继续加油，你发\n现错误的眼光，就是进步的开始！\n试题解析：\n《出塞》\n作者：徐锡麟\n朝代：清代\n军歌应唱大刀环，誓灭胡奴出玉关\n只解沙场为国死，何须马革裹户还\n赏析：\n这首诗抒发了作者义无反顾的革命激情和牺牲精\n神，充满了英雄主义气概，把一腔报效祖国、战\n死疆场的热忧发挥得淋漓尽致\n在写下了这首诗的一年以后，作者在安庆起义，\n失败被捕，清政府要他写口供，他挥笔直\n书：“尔等杀我好了，将我心剖了，两手两足断\n了，全身碎了，均可，不可冤杀学生\n尔后，慷概就义，他用生命实现了自己的理想\n这首诗感情豪放激扬，语气慷概悲壮，英气逼\n人，最后一句“何须马革裹尸还”，写出了他壮怀\n激烈、视死如归的英雄气概\n白话文：\n出征的战士应当高唱军歌胜利日来\n决心把满族统治者赶出山海关\n战士只知道在战场上，要为国捐躯\n何必考虑把户体运回家乡\n---", "grid": null, "image": null}, {"num": 27, "type": "单选题", "stem": "\"三万里河东入海，五千仞岳上摩天\"中的\"岳\"指的是____。", "options": ["A.泰山", "B.华山", "C.衡山", "D.嵩山"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友你好呀！是不是被这道题给难住了？\n别灰心，咱们一起来把它攻破，这可是大诗人陆\n游笔下的壮丽山河呢！\n咱们先把诗句当作电影镜头来看：\n第一句“三万里河东入海”，想象一条奔腾哮的\n巨龙，哗啦啦地流进大海，多么长、多么壮观！\n第二句“五千仞岳上摩天，镜头往上摇，一座像\n巨人一样的高山，山峰都摸到云彩、擦着天空\n了，多么险峻、多么高！\n你的错题很可能在这儿：\n这个“高得摸天“的感觉，就是解题的钥匙。很\n多同学看到“岳“就想到“五岳”，但到底是哪一座\n这里的关键不是这座山名气最大，而是它要\n和“摩天”（摸到天）对应，突出一个**高耸入\n云**的感觉。\n我们来看看选项：\n五岳之中，谁最以“险“和\"高“出名呢？\n泰山的特色是“雄”，雄伟：衡山是“秀”，秀丽；\n嵩山是“峻”，但都比不过华山。\n只有华山，自古以来就被称为\"奇险天下第一\n山”。它就像一把巨大的石剑，几乎是垂直地从\n地面插向天空！用”上摩天“来形容它，是不是最\n贴切、最有画面感？\n所以，答案是B.华山。\n举一反三小窍门：\n以后读到写景的古诗，不要只看字面。要学会\n找“关键词“和诗歌意境的”匹配度”。诗人选了“摩\n天这个词，就是在给我们暗示：他要写一座又\n高又陡、直插云霄的山，那自然就是华山啦！\n你已经很棒啦，能遇到这样的难题，说明你在挑\n战自己！继续保持好奇心，下次遇见山河，你就\n能一眼看透诗人的心思了！加油！\n试题解析：\n《秋夜将晓出离门迎凉有感》\n作者：陆游\n朝代：宋代\n三万里河东入海，五千仞岳上摩天。\n遗民泪尽胡尘里，南望王师又一年。\n赏析：\n第一句落笔写银河西坠，鸡鸣欲曙，渲染出一种\n苍茫静寂的气氛，表现了有心杀敌无力回天的感\n概。第二句写大好河山，陷于敌手，以“望“字为\n眼，表现了诗人希望、失望而终不绝望的千回百\n转的心情。诗境雄伟、严肃、苍凉、悲愤。组诗\n的第一首落笔写银河西坠，鸡鸣欲曙，从所见所\n闻渲染出一种苍范静寂的气氛。“一再鸣“三字，\n可见百感已暗集毫端。三四句写“有感“正面。一\n个\"欲字，一个“恰“字表现了有心杀敌无力回天\n的感概。\n白话文：\n三万里长的黄河奔腾向东流入大海，五千仞高的\n必入二委庭\n---", "grid": null, "image": null}, {"num": 28, "type": "十二宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "唯见长江天际流", "analysis": "AI解析（仅供参考）：\n同学，别灰心，这道“找诗词“的小迷宫其实暗藏\n妙趣，咱们一起来破解它吧！\n先闭上眼，想象一下：你站在黄鹤楼上送别好朋\n友，一叶小舟渐渐远去，最后消失在碧空尽头，\n只剩下浩浩荡荡的长江水向天边奔流..对，这\n就是李白《黄鹤楼送孟浩然之广陵》的画面。现\n在，老师把诗句变成了一堆小积木：“银见天流\n凝唯是长河际落江”，里面就躺着你要找的那句\n诗。\n很多小朋友第一眼会被“银、河、落“吸引，误拼\n为“疑是银河落九天”，可咱们数一数，没\n有“九“字呀！这就是第一个小陷阱。我们耐下\n心，像玩七巧板一样逐个拼凌：剩下的字里\n有“唯、见、长、江、天、际、流”，把它们抱出\n来重新排队一“唯见长江天际流”。你看，七个\n字，一字不差，正是送别时那份悠长的目光。\n举一反三小窍门：碰到这种“字卡找诗“题\n先别急着拼名句，而要快速扫一眼所有字，看哪\n一首完整诗句的“零件“全出现在了题目里。就拿\n这句”唯见长江天际流“来说，“唯”际“这种字眼\n往往是破题密码，只要找到它们，就能牵出整句\n话。\n你已经离正确答案只有一步之遥啦，下次会更细\n心的！记住，古诗词像好朋友，多见面、多揣\n摩，你们就会默契十足。加油，小小诗词探险\n家！\n试题解析：\n《黄鹤楼送孟浩然之广陵》\n作者：李白\n朝代：唐代\n故人西辞黄鹤楼，烟花三月下扬州。\n孤帆远影碧空尽，唯见长江天际流。（唯通：惟）\n赏析：\n这是一首送别诗。孟浩然从湖北到广陵去，李白\n在黄鹤楼给他送行，作了这首诗时间应当在李白\n出蜀漫游以后。\n李白从27岁到35岁的将近十年之间，虽然也到处\n漫游，但却比较固定的居住在今湖北安陆境外，\n这时，他认识了当时著名的诗人孟浩然，孟浩然\n比他大11岁，本是襄阳（今属湖北省）人，隐居\n鹿山门，常在吴、越、湘、闽等地漫游。\n这时他正想出游吴、越一带，两位大诗人在黄鹤\n楼分别，留下苦名诗篇。诗题中“之广\n陵“的”之“就是“去“或“往“的意思。\n白话文：\n老朋友向我频频挥手，告别了黄鹤楼，在这柳絮\n如烟、繁花似锦的阳春三月去扬州远游。\n友人的孤船帆影渐渐地远去，消失在碧空的尽\n头，只看见一线长江，向邀远的天际奔流。\n---", "grid": {"slots": 7, "rows": [["银", "见", "天", "流"], ["疑", "唯", "是", "长"], ["河", "际", "落", "江"]]}, "image": null}, {"num": 29, "type": "判断题", "stem": "孟郊，唐代著名诗人，苦吟诗人代 表，代表作有《游子吟》、《登科后》、《寻隐者不遇》。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n宝贝，别急着皱眉，这道题咱们一起来当个小侦\n探，把里面的小迷糊揪出来好不好？\n首先，题目前半句很棒，“孟郊，唐代著名诗\n人这句完全正确，他和另一位诗人贾岛齐名\n后人常把他们并称为“郊寒岛瘦”。不过，这里也\n藏着一个容易混淆的小陷阱哦：\n哪里出错了？\n题目里说他是“苦吟诗人代表”。我们常说的“苦吟\n派“代表人物，其实是贾岛。贾岛写诗特别较\n真，是那种“两句三年得，一吟双泪流“的痴迷。\n而孟郊星然风格也很古朴、深刻，但人们提起\n他，首先想到的是“孝子“和“春风得意”。\n那作品对不对呢？\n我们再来看诗。\n·《游子吟》：对，这是孟郊的代表作，“慈\n母手中线，游子身上衣”，写尽了母爱的温\n暖。\n《登科后》：也对，“春风得意马蹄疾，一\n日看尽长安花”，就是他46岁好不容易考中\n进士时，乐开了花写的。\n《寻隐者不遇》：停！问题就出在这里！\n请问，“松下问童子，言师采药去“是谁写\n的呢？\n这首诗的作者是一贾岛。你看，贾岛去\n寻访隐士没找到，就问小童子，这才有了\n这首充满童趣的小诗。\n所以，这道题把孟郊和贾岛的代表作搞混\n了，还把“苦吟“的头衔戴在了孟郊头上，\n因此这道题是错的。\n举个反三小窍门：\n以后看到“郊寒岛瘦“这俩人，咱们可以这\n样记：\n孟郊：心中有爱，牵挂妈妈，想着考试，\n诗里都是浓浓的情。\n贾岛：脑中推敲，爱纠结用“推“好还\n是“敲\"好，还总爱去山里找人（比如找隐\n士），写诗特别刻苦。\n你真厉害，跟着我一步步分析，就把这个\n大难题拆解开了！下次再遇到“郊岛”二人\n组，你一定能分得清清楚楚。继续加油，\n古诗文的世界里还有很多有趣的故事等着\n你呢！\n试题解析：\n《游子吟》\n作者：孟郊\n朝代：唐代\n慈母手中线，游子身上衣。\n临行密密缝，意恐迟迟归。\n谁言寸草心，报得三春晖。\n赏析：\n深挚的母爱，无时无刻不在沐浴着儿女们。然而\n对于孟郊这位常年颠沛流离、居无定所的游子来\n说，最值得回忆的，莫过于母子分离的痛苦时刻\n了。此描写的就是这种时候，慈母缝衣的普通场\n景，而表现的，却是诗人深沉的内心情感。\n白话文：\n慈母用手中的针线，为远行的儿子赶制身上的衣\n衫。\n---", "grid": null, "image": null}, {"num": 30, "type": "单选题", "stem": "写诗力求通俗易懂，诗作\"老妪能解\"的诗人是____。", "options": ["A.王维", "B.白居易", "C.刘禹锡", "D.杜牧"], "answer": "B", "analysis": "AI解析（仅供参考）：\n别灰心，这道题其实藏着一个特别温暖的小故\n事，我们一起来挖一挖\n场景还原：回到唐朝的街巷\n想象一下，一位白发苍苍的大诗人，每写完一首\n诗，就跑到门口找那些洗衣服、纳鞋底的老奶\n奶，念给她们听。老奶奶要是摇头说“听不懂”，\n他立马拿回去改，直到她们笑着点头为止。这\n位“较真“的诗人，就是我们要找的人。\n错题破译：为什么可能是“白居易\"？\n你的选项里，王维哥哥的诗像一幅淡雅的水墨\n画，常常很空灵：杜牧叔叔的诗比较清丽俊爽；\n刘禹锡伯伯的诗则有一种倔强的豪气。而只有一\n个人，把让老百姓都能读懂“当作自己写诗的使\n命，他就是白居易。他甚至有个外号叫诗\n魔“和\"诗王”，就是因为太热爱把诗写到极致平易\n啦！所以，正确答案是B。\n你可能掉进的小陷阱\n很多同学会误选A王维，因为觉得他的诗也简\n单？但王维的简单是“诗中有画“的意境深，比\n如“空山不见人”，表面简单，背后藏着禅意。白\n居易的简单，是老奶奶真能一字一句听明白\n的“大白话”。这就是“老能解“的专属标签。\n举一反三小口诀\n老能解“就是白居易的“独家身份证”。以后看\n到题目问“哪位诗人最接地气？诗很通俗？”\n勇敢地锁定白居易！\n你发现了一个特别重要的文学常识，这可是读懂\n唐诗的一把钥匙呢。下次遇到，你一定能像老朋\n友一样认出他！继续加油\n---", "grid": null, "image": null}, {"num": 31, "type": "九宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "非是藉秋风", "analysis": "AI解析（仅供参考）：\n哇，小朋友，你遇到了一个特别有趣的“文字捉\n迷藏“题呢！别急，我们一起当一回小侦探，把\n藏在里面的诗句揪出来好不好？\n第一步：还原“案发现场”\n你看，题目给了一堆散落的字：“是月风出秋山\n非流藉”。这就像一幅被打乱的拼图。\n如果我们试着把这些字重新排排邦队，有没有哪几\n个字特别眼熟？是不是一下子就答见了“秋风”\n这两个字？\n第二步：寻找“顺藤摸瓜”\n找到了“秋风”，我们就抓住这根藤，看它旁边\n还连着谁。喷，“秋风”前面有个“藉”字。如果\n你读过唐代诗人虞世南的《蝉》，就会立刻想到\n一句超级有名的诗，叫非是藉秋风！\n我们核对一下，这五个字\n“非”、“是”、“籍”、“秋”、“风”是不是全都躲\n在题目那堆乱字里了？完全正确！\n第三步：解开悬念与误区\n你可能会问，那剩下的”月、出、山、流“是干嘛\n的呀？\n这可就是题目的“迷雾弹“啦！这首《蝉》里还有\n一句“流响出疏桐”，所以“流“和”出“也是这首诗\n里的字，甚至连题目都没出现的~明月“也可能干\n扰你想到其他写景的诗。这题就是故意考验你，\n能不能在一堆同音、同义或同诗的干扰字中，精\n准地发现那完整的一句。\n下次碰到这种题，送你一个小窍门：先找最明显\n的那个词（比如“秋风\"），然后向左右扩展拼\n凑，心里默念几首学过的诗，答案自己就跳出来\n啦！\n你不仅找到了正确答案，还识破了题目的障眼\n法，真厉害！记住这个感觉，诗词其实很有\n趣，对吧？\n试题解析：\n《蝉-虞世南》\n作者：虞世南\n朝代：唐代\n垂矮饮清露，流响出疏桐。\n居高声自远，非是籍秋风。\n赏析：\n人笔下的蝉是人格化了的蝉。三、四句借蝉抒\n情：品格高洁者，不需借助外力，自能声名远\n播。\n首句“垂委饮清露”，“缕“是古人结在额下的帽\n带下垂部分，的头部有伸出的触须，形状好像\n下垂的冠缪，故说“垂”。\n古人认为蝉生性高洁，栖高饮露，故说饮清\n露”。这一句表面上是写蝉的形状与食性，实际\n上处处含比兴象征。“垂“暗示显宦身份（古代\n常以“冠缦“指代贵宦）。\n古人以蝉居高饮露象征高洁，作者以比兴和寄托\n的手法，表达自已的情操。本诗与骆宾王、李\n商隐的《咏蝉》同为当时咏蝉诗三绝。\n---", "grid": {"slots": 5, "rows": [["是", "月", "风"], ["出", "秋", "山"], ["非", "流", "藉"]]}, "image": null}, {"num": 32, "type": "单选题", "stem": "下列不属于唐代新乐府运动倡导者的 是谁？", "options": ["A.刘禹锡", "B.白居易", "C.元稹", "D.李绅"], "answer": "A", "analysis": "AI解析（仅供参考）：\n同学你好呀！我是你的古诗文伙伴～看到这\n道题，是不是感觉这几位大诗人都很眼熟，一时\n有点拿不准？别急，咱们一起穿越回唐朝，把这\n些大文豪的朋友圈关系搏一授，保证你以后再也\n忘不掉！\n场景还原：一场诗歌界的“革命聚会”\n想象一下，唐朝中期有几位诗人聚在一起，他们\n觉得当 : "只留清气满乾坤", "analysis": "AI解析（仅供参考）：\n同学你好呀！看到这堆乱乱的字，是不是像在拼\n一幅会唱歌的拼图必？别急，咱们一起来玩\n个“诗词拼图“游戏，把这些淘气的字宝宝送回它\n们真正的家。\n你现在看到的“留气坤清要白青满人只乾间”，其\n实藏着一股好闻的“香气“哦一你想，什么花不用\n鲜艳的颜色去争宠，却把清清的香气满满地留在\n天地间？对啦，就是那首王冕的《墨梅》！\n我们来找找线索：诗人说“不要人夸好颜色”，那\n颜色是怎么样的？有“白“有“青”，但诗里说不要\n它们。那要什么呢？“只留清气满乾坤”一谜底\n呼之欲出！我们把需要的字拣出来：只、留、\n清、气、满、乾、坤，整整齐齐七个字，刚好\n成一句七言诗。多余的字恰好是诗人“不要“的那\n些颜色“和人言。\n你看，这个题的小陷阱就是把关联的诗句字词打\n散，还混进“不要“的干扰项。很多小朋友一看\n见“清白”、“人间“就自己脑补组词，结果掉进\n坑。但如果我们记住《墨梅》里那股清气的品\n格，就不会被花花绿绿的字迷惑啦\n小门：遇到乱字组诗，先在心里唱一遍最\n熟的句子，把“主角“字抓出来，陌生的字往往是\n干扰哦！\n今天的你，又挖到了一缕藏在汉字里的“清气”，\n真了不起。保持这份对诗词的敏感，下次拼图游\n戏你一定是冠军！继续加油~\n试题解析：\n《墨梅》\n作者：王冕\n朝代：元代\n我家洗砚池头树，朵朵花开淡墨痕。\n不要人夸好颜色，只留清气满乾坤。\n赏析：\n这是一首题画诗。诗人赞美墨梅不求人夸，只愿\n给人间留下清香的美德，实际上是借梅自喻，表\n达自己对人生的态度以及不向世俗献媚的高尚情\n操。\n白话文：\n我家洗砚池边有一棵梅树，朵朵开放的梅花都显\n出淡淡的墨痕。\n不需要别人夸它的颜色好看，只需要梅花的清香\n之气弥漫在天地之间。\n---", "grid": {"slots": 7, "rows": [["留", "气", "坤", "清"], ["要", "白", "青", "满"], ["人", "只", "乾", "间"]]}, "image": null}, {"num": 35, "type": "单选题", "stem": "黄河远上白云间，一片孤城万仞 山\"中的\"仞\"与\"尺\"和\"丈\"，从大到小 的排列顺序应该是？", "options": ["A.仞、丈、尺", "B.丈、尺、仞", "C.丈、仞、尺"], "answer": "C", "analysis": "AI解析（仅供参考）：\n小朋友，别着急，咱们一起来把这个“长度单\n位的小坑填平！\n场景还原\n你能想象吗？诗人站在黄河边抬头望，那澎湃的\n河水仿佛从白云间奔涌而下，远处的高山脚下，\n一座孤零零的边城正要被万仍高的群山环\n抱。“万仍“就是用来形容山又高又随的，并不是\n真正量了有一万次。\n精准破题\n这道题问的是：仞、尺、丈谁大谁小。\n咱们需要记住三个“古代小尺子“的关系\n尺，是最短的，大概像我们今天的直尺那\n么长。\n·丈，就是十尺，比爸爸的个子还高，在古\n代已经是很大的单位了。\n仍，有点特别，古人把一个人伸长双臂的\n长度叫作一仞，大约在七尺到八尺之间。\n所以从大到小排队：丈最大，初在中间，\n尺最小—也就是丈>仍>尺，对应选\n项C。\n小朋友最容易错的地方，是把“仞“当成\n比“丈“还大的单位，因为诗句里“万仍山\"听\n起来太夸张了。其实呀，这只是诗人为了\n突出山的高耸，用了万这个虚数，并不\n是单位本身最大。\n举一反三小窍门\n下次再遇到古诗里的长度单位，先想一\n想：\n“丈\"是十尺，稳居老大：“仍“是一臂之长，\n常扮演“七八尺“的老二；“尺\"就是最矮的小\n弟啦。\n你还可以把手臂张开，感受一下一仍“的\n长度，这样永远都不会忘啦！\n你已经很认真地思考了，这比直接猜对答\n案更有价值。带若这个发现，去古诗里探\n险吧，你一定会越来越厉害的！\n试题解析：\n《凉州词二首·其一》\n作者：王之涣\n朝代：唐代\n黄河远上白云间，一片孤城万仍山。\n羌笛何须怨杨柳，春风不度玉门关。\n赏析：\n王之涣这首诗写戌边士兵的怀乡情。写得苍\n凉慷憾，悲而不失其壮，虽极力泣染成卒不得还\n乡的怨情，但丝毫没有半点颜丧消沉的情调，充\n分表现出盛唐诗人的豁达广阔胸怀。\n首句“黄河远上白云间抓住远跳的特点，描\n绘出一幅动人的图画：辽阔的高原上，黄河奔腾\n而去，远远向西望去，好像流入白云中一般。次\n句“一片孤城万仞山”，写塞上的孤城。在高山大\n河的环抱下，一座地处边塞的孤城巍然屹立。这\n两句，描写了祖国山川的雄伟气势，勾勒出这个\n国防重镇的地理形势，突出了成边士卒的荒凉境\n遇，为后两句刻画成守者的心理提供了一个典型\n---", "grid": null, "image": null}, {"num": 36, "type": "十二宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "月黑见渔灯", "analysis": "AI解析（仅供参考）：\n看到这道题，你是不是觉得这些字乱糟糟的，像\n小蚂蚁在打架？别急，让老师陪你一起把它们排\n排队，变出一句优美的古诗来。\n还原画面\n深夜，没有月亮，到处黑乎乎的。诗人站在江\n边，忽然看见远处有一点亮光，忽明忽暗。那是\n什么？走近一看，呀，原来是一盏小小的渔灯，\n映在墨色的水面上，像孤独的萤火虫。\n破解谜题\n你看，题目给的字是：月、雁、见、灯、黑、\n里、渔、夜、飞。\n老师悄悄告诉你，这里面藏着一句清代诗人查慎\n行的诗\n“月黑见渔灯”\n哦！你是不是被“雁“和”飞“带偏了，想到“月黑雁\n飞高“去了？这是很多人都会掉的小陷阱呢。其\n实，只要先把“月黑“放在一起，再找\n到“见”渔”灯”，那句诗就像用丝线申珍珠一\n样，一下子申起来啦。剩下的\"雁”里\"夜”飞\"是\n来当小迷兵的，不用理它们。\n小窍门\n以后做这种拼字寻诗的游戏，你可以先想想学过\n的诗里有没有哪些字经常组队出现，比如“月\n黑—它后面常跟着什么？像背顺口溜一样\n嘴里念念，答案就会蹦出来。\n看，古诗就像捉迷藏，找到了特别有成就感吧？\n你有一双善于发现美的眼睛，继续加油，下次一\n定会更快找到隐藏的诗句！\n试题解析：\n《舟夜书所见》\n作者：查慎行\n朝代：清代\n月黑见渔灯，孤光一点萤\n微微风簇浪，散作满河星\n赏析：\n这首诗好似一幅速写，作者抓住了那倒映在水中\n的渔火化作满天星星的片刻，几笔勾勒，立即捕\n捉住了这转瞬即逝的景物\n这首诗又好似一幅木刻，在漆黑的背景之上，亮\n出一点渔火，黑白对比，反差特别鲜明\n白话文：\n漆黑之夜不见月亮，只见那渔船上的灯光，孤独\n的灯光在茫茫的夜色中，像萤火虫一样发出一点\n微亮\n微风阵阵，河水泛起层层波浪，渔灯微光在水面\n上散开，河面好像撒落无数的星星\n---", "grid": {"slots": 5, "rows": [["月", "雁", "见"], ["灯", "黑", "里"], ["渔", "夜", "飞"]]}, "image": null}, {"num": 37, "type": "九宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "空山不见人", "analysis": "AI解析（仅供参考）：\n小朋友，别着急，我们来玩一个文字藏\n宝“的游戏吧！这堆字就像散落的珍珠，咱们一\n起来串成漂亮的诗句项链。\n先闭上眼睛，想象一下\n寂静的山谷里\n没有一个人影，只有斑驳的树影和偶尔的鸟鸣。\n这种“空灵“的感觉，你能猜到是哪句诗吗？\n悄俏提示你：唐朝大诗人王维在《鹿柴》里\n写过一句话，形容空荡荡的山间看不见人影。咱\n们需要的字是：空、山、不、见、人。嘿，你\n瞧！这些字全藏在给你的那堆字里呢：“江见来\n山往不月空人”。把它们挑出来排排队，不就\n是“空山不见人“吗？\n你可能会问：“为什么不是江月开头呢？这\n就是古诗的趣味，它像拼图，意象要合得\n上。“江月往来“虽然也很美，但只有“空山不见\n人“是一句完整的，广为流传的诗句哦。\n记住一个小窍门：做这种“找诗句“题时，先\n想想最熟的唐诗宋词，哪些句子的字能在乱序中\n找到，用“感受意境“来锁定目标。下次你也能秒\n变诗词侦探！\n你已经很棒了，继续保持好奇心，古诗的大花园\n等你常来逛逛~\n试题解析：\n《鹿柴》\n作者：王维\n朝代：唐代\n空山不见人，但闻人语响。\n返景入深林，复照青苔上。\n赏析：\n第一句“空山不见人”，先正面描写空山的查\n无人迹。王维特别喜欢用“空山“这个词语，但在\n不同的诗里，它所表现的境界却有区别。“空山\n新雨后，天气晚来秋”（《山居秋》），侧重\n于表现雨后秋山的空明洁净：“人闲桂花落，夜\n静春山空”（《鸟鸣涧》），侧重于表现夜间春\n山的宁静幽美；而“空山不见人，则侧重于表现\n山的空寂清冷。由于杳无人迹，这并不真空的山\n在诗人的感觉中显得空廊虚无，宛如太古之\n境。“不见人”，把“空山“的意蕴具体化了。\n如果只读第一句，读者可能会觉得它比较平\n常，但在“空山不见人“之后紧接“但闻人语响”\n却境界顿出。“但闻“二字颇可玩味。通常情况\n下，寂静的空山尽管“不见人”，却非一片静默死\n寂。瞅瞅鸟语，唧唧虫鸣，瑟瑟风声，漏漏水\n响，相互交织，大自然的声音其实是非常丰富多\n彩的。然而此刻，这一切都杳无声息，只是偶尔\n传来一阵人语声，却看不到人影（由于山深林\n密）。这\"人语响”，似乎是破“寂“的，实际上是\n以局部的、暂时的“响“反衬出全局的、长久的空\n寂。空谷传音，愈见空谷之空；空山人语，愈见\n空山之寂。人语响过，空山复归于万籁俱寂的境\n-n0\n---", "grid": {"slots": 5, "rows": [["江", "见", "来"], ["山", "往", "不"], ["月", "空", "人"]]}, "image": null}, {"num": 38, "type": "判断题", "stem": "《乞巧》是唐代诗人林杰描写民间七 夕乞巧盛况的名诗，是一首想象丰 富、流传很广的古诗。诗句浅显易 懂，涉及到家喻户晓的神话传说故 事，表达了母亲对孩子的美好祝愿。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n哎呀，小朋友，别灰心！这个判断题就像一个小\n小的陷阱，很多同学都会掉进去。来，我们一起\n把它弄明白\n我们先把这首诗想象成一幅画：七夕节的晚上，\n一个女孩抬头看着天上的牵牛星和织女星，她忙\n着穿针引线，想让自己像织女一样心灵手巧。这\n就是林杰笔下最动人的场景。\n这道题的前半部分都是对的！林杰确实是唐代诗\n人，《乞巧》描写的也正是七夕节大家乞求心灵\n手巧的盛大场面。“七夕今宵看碧霄，牵牛织女\n渡河桥”，光是听我读，你是不是已经能想象一\n群女孩仰望星空的样子了？\n可是呀，题目里混进了一颗”小地雷”—“表达\n了母亲对孩子的美好祝愿”。\n在古代，乞巧的主角是准呢？是那些憧憬美好、\n渴望有一双巧手的姑娘们自己。她们在月下比赛\n穿针，看谁最快，就是为了“乞求“自已变得心灵\n手巧。所以这首诗抒发的是女孩子自己乞求智慧\n和手艺的美好心愿，而不是母亲替孩子许的愿。\n你觉得这个区别重要吗？\n记忆小窍门：看到乞巧“两个字，就记住是“我\n自己“乞求变“巧”。下次再遇到类似的题目，先\n看清楚诗中祝福的对象，就不会被带偏啦！\n别怕犯错，每一次辨析都能让你对古诗的理解更\n深一层。加油\n试题解析：\n《乞巧》\n作者：林杰\n朝代：唐代\n七夕今宵看碧霄，牵牛织女渡河桥。\n家家乞巧望秋月，穿尽红丝几万条。\n赏析：\n《乞巧》是唐代人林杰描写民间七夕乞巧盛况的\n诗。农历七月初七夜晚，俗称七夕”，又称“女儿\n节“少女节”。是传说中隔着“天河“的牛郎和织女\n在鹊桥上相会的日子。乞巧，就是向织女乞求一\n双巧手的意思。\n乞巧最普遍的方式是对月穿针，如果线从针孔穿\n过，就叫得巧。“七夕今霄看碧霄，牵牛织女渡\n河桥。“碧霄“指浩瀚无际的青天。开头两句叙述\n的就是牛郎织女的民间故事。\n一年一度的七夕又来到了，家家户户的人们纷纷\n情不自禁地抬头仰望浩瀚的天空，这是因为这一\n美丽的传说牵动了一颗颗善良美好的心灵，唤起\n人们美好的愿望和丰富的想象。\n白话文：\n七夕晚上，望着碧蓝的天空，就好像看见隔\n若“天河“的牛郎织女在鹊桥上相会。\n家家户户都在一边观赏秋月，一边乞巧（对月穿\n针），穿过的红线都有几万条了。\n---", "grid": null, "image": null}, {"num": 39, "type": "单选题", "stem": "李白《黄鹤楼送孟浩然之广陵》一诗 中的\"黄鹤楼\"位于中国哪座城市？", "options": ["A.南昌", "B.武汉", "C.岳阳", "D.太原"], "answer": "B", "analysis": "AI解析（仅供参考）：\n同学，你好呀！我是唐老师。咱们今天遇到\n的这个问题，其实藏着一段特别美的故事，不用\n着急，老师带你坐上“诗词小飞船”，飞到唐朝去\n看一看！\n场景还原：跟着李白去送别\n闭上眼晴想象一下：春天到了，柳絮飘飞。大诗\n人李白站在一座临江的高楼上，望着他的偶像\n一大诗人孟浩然，乘着一只小船，顺着江水缓\n缓向东流去，直到消失在蓝天的尽头。李白触景\n生情，写下了“孤帆远影碧空尽，唯见长江天际\n流。\n那座李白站着远眺的楼，就是我们题目里的黄鹤\n楼。它蹲在长江边上，看着江水滚滚东流。既然\n它守看长江，你觉得它最可能在选项里哪座城市\n呢？\n精准破题：带你拨开迷雾\n很多同学会选错，通常是因为把“黄鹤楼”、“岳阳\n楼“和“滕王阁“这几位“江南好兄弟“的家给记混\n啦！\n你错在哪？如果你选了C.岳阳，那是岳阳\n楼的所在地（范仲淹的《岳阳楼记》就在\n那里）；如果选了A.南 就豁然开朗了！你真棒，继续加\n油，古诗文的小世界会越来越有趣哦！\n---", "grid": null, "image": null}, {"num": 53, "type": "单选题", "stem": "\"梅雪争春未肯降，骚人阁笔费评章\"中的\"骚人\"指的是____。", "options": ["A.风骚之人", "B.诗人自己", "C.诗人", "D.造谣之人"], "answer": "C", "analysis": "AI解析（仅供参考）：\n同学别急，这道题其实是古诗里一个很有趣的小\n典故，咱们一起把它弄清楚就好啦～\n我们先来想象一下那幅画面：梅花和雪花在春天\n里争奇斗艳，谁也不肯服输。这时候，有位文\n人“搁下笔”（阁笔就是搁下笔），费尽心思要评\n判它们谁更美。这位文人，诗里就称作“骚人”。\n骚人这个词，最早和伟大的爱国诗人屈原有\n关。他写过一部著名的长诗叫《离骚》，因为这\n部作品太有名了，后人就把能写诗的文人雅士，\n特别是那些有才情的诗人，尊称为~骚人”。所以\n在这首诗里，“骚人“并不是指某个具体的人，而\n是一个更宽泛的说法一一诗人，比如作者自己也\n好，其他诗人也好，都可以用“骚人“来指代。\n现在回头看看选项：\nA风骚之人\"：听起来像指举止轻浮的人，\n是个现代常见的误会，不太对哦。\nB\"诗人自己”：这里的\"骚人“是泛指，不一\n定就是作者本人，就像我们说“读者“不一\n定指你一个人一样。\nC\"诗人：对了！它就是一种文雅的称呼\n泛指写诗的人。\nD\"造谣之人”：这个就离题太远啦，和诗意\n完全没关系。\n你可能会想，为什么不选B呢？关键在于\n古人用“骚人“往往不限于自指，更像我们\n现在说“文人黑客”一样，是一种群体的美\n称。作者自已当然也是其中之一，但诗句\n强调的是“有个诗人放下笔来评理“这个普\n遍场景，所以C是最准确的。\n记住这个小窍门：古诗里只要看到骚\n人”，把它理解成“诗人“就行。下次再遇到\n这个词，你就能当小老师给大家解释了~\n能勤于思考这道题，你已经很了不起，继\n续加油啊！\n试题解析：\n《雪梅·其一》\n作者：卢钱\n朝代：宋代\n梅雪争春未肯降，骚人阁笔费评章。\n梅须逊雪三分白，雪却输梅一段香。\n赏析：\n古今不少诗人往往把雪、梅并写。雪因梅，透露\n出春的信息，梅因雪更显出高尚的品格。\n首句采用拟人手法写梅花与雪花相互竞争，都认\n为自己是最具早春特色的，而且互不认输，这就\n将早春的梅花与雪花之美别出心裁、生动活泼地\n表现出来了。次句写诗人在两者之间难以评判高\n下。诗人原以为一挥而就，由于难于评判，只好\n停下笔来思索。\n白话文：\n梅花和雪花都认为各自占尽了春色，谁也不肯服\n输。难坏了诗人，难写评判文章。\n说句公道适梅花须融让雪花三分晶莹洁白\n---", "grid": null, "image": null}, {"num": 54, "type": "单选题", "stem": "以下诗句与\"故人西辞黄鹤楼，烟花三月下扬州\"是同一作者的是____", "options": ["A.王师北定中原日，家祭无忘告乃翁", "B.两岸青山相对出，孤帆一片日边来", "C.葡萄美酒夜光杯，欲饮琵琶马上催", "D.白日放歌须纵酒，青春作伴好还乡"], "answer": "B", "analysis": "AI解析（仅供参考）：\n哎呀，小朋友别灰心，这道题就像走迷官，走错\n了路反而能记得更牢呢！我们先来看看题干这句\n诗：“故人西辞黄鹤楼，烟花三月下扬州。你能\n想象吗？在繁花似锦的三月，大诗人李白站在黄\n鹤楼上，目送好朋友孟浩然乘船远去，心里又向\n往又舍不得，所以写下这首千古绝唱。所以，这\n句诗的作者是一对了，是李白。\n现在，咱们化身小侦探，给每个选项也找找“主\n人“吧！\nA选项：“王师北定中原日，家祭无忘告乃\n翁“——这是陆游老爷爷临终前对儿子的嘱托\n满满的爱国情。\nB选项：“两岸青山相对出，孤帆一片日边\n你瞧，两岸青山像在迎接你，一片小船\n来\n从太阳边飘来，这是李白在《望天门山》里描绘\n的壮丽景色呀！\nC选项：“葡萄美酒夜光杯，欲饮琵琶马上\n催”—这是唐代王翰在边塞写的，战士们正要\n举杯，琵琶声却催着上马，多豪迈。\nD选项：白日放歌须纵酒，青春作伴好还\n乡”—这是杜甫听到战争结束，开心得想唱歌\n喝酒、马上回家。\n你的错误，很可能是把李白的诗和杜甫的弄混\n了，因为他们都是那么有名的诗人，又都写过回\n家的喜悦。其实呀，区分李杜有个小窍门：李白\n经常写“山、水、仙、月”，像天门山、黄鹤楼，\n风格特别飘逸浪漫；杜雨更多写“家、国、民、\n史”，像收 ：\n以后看到杜甫爷爷晚年写的诗，尤其是那些\n写“秋天”、“登高”、“多病”的，可以多想想：他\n哭，是不是不仅为自己，也为天下人？这就叫\n“沉郁顿挫”。\n太棒了，你现在已经理解了这个错题的精髓！你\n不仅知道了正确答案，还走进了杜甫爷爷的心\n里。继续加油，下一个诗词小侦探就是你！\n试题解析：\n《登高》\n作者：杜甫\n朝代：唐代\n风急天高猿啸哀，清沙白鸟飞回。\n无边落木萧萧下，不尽长江滚滚来。\n万里悲秋常作客，百年多病独登台。\n艰难苦恨繁霜登，潦倒新停浊酒杯。\n赏析：\n此诗载于《杜工部集》，全诗通过登高所见\n秋江景色，倾诉了诗人长年漂泊、老病孤愁的复\n杂感情，慷慨激越、动人心弦。\n此诗前四句写登高见闻。首联对起。诗人围\n绕变州的特定环境，用“风急“二字带动全联，一\n开头就写成了千古流传的佳句。变州向以猿多著\n称，峡口更以风大闻名。秋日天高气爽，这里却\n猎猎多风。诗人登上高处，峡中不断传来“高猿\n长啸“之声，大有“空谷传响，哀转久绝”（《水经\n注·江水》）的意味。诗人移动视线，由高处转\n向江水洲渚，在水清沙白的背景上，点缀着迎风\n飞翔、不住回旋的鸟群，真是一幅精美的画图。\n其中天、风，沙、渚，猿啸、鸟飞，天造地设\n自然成对。不仅上下两句对，而且还有句中自\n对，如上句“天“对“风”，“高“对“急”：下\n---", "grid": null, "image": null}, {"num": 66, "type": "单选题", "stem": "孟郊直到五十岁才得到一个地方的县 尉官职，将母亲接来并写下了《游子 吟》，请问这个地方是哪里？", "options": ["A.溧阳", "B.衢州", "C.洛阳", "D.荥阳"], "answer": "A", "analysis": "AI解析（仅供参考）：\n同学你好呀！遇到这样有点“小细节“的题\n目，一时拿不准太正常啦，千万别灰心。来，让\n我们像听故事一样，一起走进孟郊爷爷的人生时\n刻。\n场景还原：大器晚成的诗人\n你能想象吗？孟郊家里一直不富裕，他刻苦读\n书，却到46岁才终于考中进士，算是个“高龄考\n生“了。又苦苦等了四年，在他50岁的时候，才\n好不容易得到了人生中第一个像样的官职。\n那是一个叫溧阳的江南小城，他被任命为那里\n的县尉。官虽不大，但总算有了稳定的俸禄！孟\n郊安顿下来的第一件事，就是立刻派人把家里的\n老母亲接过来奉养。就是在这个人生终于安稳、\n母子重逢的温情时刻，他回忆着母亲为自己缝衣\n的样子，写下了干古绝唱《游子吟》。\n精准破题：我们是怎么走错路的？\n这道题容易看走眼的地方在于“洛阳”和“荥\n阳。\n错误分析：洛阳是大唐的东都，非常繁\n华：荥阳是李商隐等大诗人生活过的地\n方，名气也很大。我们可能下意识地觉\n得，大诗人去当官，多半就该在这类大城\n市吧？\n正确路径：但别忘了孟郊当时的情形，他\n年过半百才得到一个微末的官职，正是外\n派到地方基层的。漂阳虽然不像洛阳那样\n声名显赫，却是他真实上任并写下这首诗\n的地方。\n举一反三小窍门\n下次遇到这种“诗人名篇与地点“的题目，我们可\n以先想一想这首诗的“温度“是哪里来的？\n《游子吟》的“温度“就来自那个小小的江南县德\n里，一盏孤灯下，母子团聚的平凡烟火气。这比\n繁华的都城，更能体现出\"归家\"与“母爱“的珍\n贵。\n记住这个画面，答案就锁定了：A.漂阳。\n你已经很棒了，愿意去了解诗文背后的故事，就\n是学好语文最棒的秘诀！继续保持这分好奇心哦\n试题解析：\n《游子吟》\n作者：孟郊\n朝代：唐代\n慈母手中线，游子身上衣。\n临行密密缝，意恐迟迟归。\n谁言寸草心，报得三春晖。\n赏析：\n深挚的母爱，无时无刻不在沐浴着儿女们。然而\n对于孟郊这位常年颠沛流离、居无定所的游子来\n说，最值得回忆的，莫过于母子分离的痛苦时刻\n了。此描写的就是这种时候，慈母缝衣的普通场\n景，而表现的，却是诗人深沉的内心情感。\n---", "grid": null, "image": null}, {"num": 67, "type": "九宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "居高声自远", "analysis": "AI解析（仅供参考）：\n小朋友，别急，咱们一起来“寻宝”~这堆字\n宝宝看似杂乱，其实藏着一句很有名的诗呢！\n先闭上眼晴想象一下：夏天的午后，一只蝉趴在\n高高的大树上唱歌，它的声音传得好远好远。这\n是为什么呢？诗人虞世南给出了答案—“居高\n声自远。\n你看，“夜、高、远、静、声、春、居、自、\n山里，正好能挑出“居、高、声、自、远“这五个\n字。排一排，是不是就成了？\n哪里容易错？\n很多同学看到“夜、静、春、山”，马上想起“夜静\n春山空”，但里面没有“空“字呀。古诗填空要像拼\n图一样，一个笔画都不能多，一个字也不能少。\n只能从现有字里找。\n记住这个小窍门：\n找诗先找动词，“居“在开头领队，“自远“说明结\n果，连起来就是“因为站得高，声音自然传得\n远”。以后碰到乱序字，先找最熟悉的名句，再\n核对每个字有没有到场。\n你瞧，古诗就像搭积木，顺序一变就换了新模\n样，多好玩！下次再玩这个游戏，你肯定能一眼\n识破～\n试题解析：\n《蝉-虞世南》\n作者：虞世南\n朝代：唐代\n垂矮饮清露，流响出疏桐。\n居高声自远，非是藉秋风。\n赏析：\n人笔下的蝉是人格化了的蝉。三、四句借蝉抒\n情：品格高洁者，不需借助外力，自能声名远\n播。\n首句“垂委饮清露”，“缕“是古人结在颌下的帽\n带下垂部分，蝉的头部有伸出的触须，形状好像\n下垂的冠缨，故说“垂缕”。\n古人认为蝉生性高洁，栖高饮露，故说“饮清\n露”。这一句表面上是写蝉的形状与食性，实际\n上处处含比兴象征。“垂缕“暗示显直身份（古代\n常以“冠缀指代贵宦）。\n古人以蝉居高饮露象征高洁，作者以比兴和奇托\n的手法，表达自已的情操。本诗与骆宾王、李\n商隐的《咏蝉》同为当时咏蝉诗三绝。\n这是初唐名臣虞世南的一首咏物诗，咏物中尤多\n寄托，具有浓郁的象征性。句句写的是蝉的形\n体、习性和声音，而句句又暗示着诗人高洁清远\n的品行志趣，物我互释，咏物的深层意义是咏\n人。\n白话文：\n蝉垂下像帽缪一样的触角吸吮着清澈甘甜的露\n水，声音从挺拔疏朗的梧桐树枝间传出。\n蝉声远传是因为蝉居在高树上，而不是依靠秋\n---", "grid": {"slots": 5, "rows": [["夜", "高", "远"], ["静", "声", "春"], ["居", "自", "山"]]}, "image": null}, {"num": 68, "type": "判断题", "stem": "青箸笠，绿蓑衣，斜风细雨不须 归\"出自张志和的《渔歌子》，其中 《渔歌子》是词牌名。", "options": ["A. 正确", "B. 错误"], "answer": "A", "analysis": "AI解析（仅供参考）：\n小朋友，别急，咱们一起来看看这道小判断题\n闭上眼晴，想象一下：一位头戴青色斗笠、身披\n绿衰衣的渔翁，坐在小船里，任风儿斜吹、雨丝\n飘飘，却笑着说不急着回家。这幅画一样的情\n景，就是张志和爷爷写的《渔歌子》里的句子\n哦。\n现在，咱们来当一回“诗词小侦探”：\n题目说，《渔歌子》是“词牌名”。什么是词牌名\n呀？就像歌曲的曲谱名字，比如《让我们荡起双\n桨》是歌名，而“渔歌子“就是那种词的曲调格\n式。张志和写的这首词，正是用了《渔歌子》这\n个牌调，所以《渔歌子》确实是词牌名，而不是\n题目本身。很多小朋友容易把它当成诗的标题，\n但词往往有词牌名，有时会另加一个题目。这首\n词没有另加题目，我们提到它时就称《渔歌\n子》。所以，这句话说得对，是正确的购！\n记住一个小窍门：遇到像“渔歌子“忆江南”清平\n乐这样三个字左右、听起来很美的名字，常常\n是词牌名。下次再见到，你就能一眼认出来啦！\n你发现错误的小火苗了吗？能自己找到问题，就\n是最棒的进步！继续加油，你离诗词小达人又近\n了一步~\n试题解析：\n《渔歌子》\n作者：张志和\n朝代：唐代\n西塞山前白鹭飞，桃花流水鱼肥\n青箸笠，绿蓑衣，斜风细雨不须归\n赏析：\n词中描写了江南水乡春汛时的山光水色和怡情悦\n性的渔人形象：春江水绿、烟雨迷蒙，雨中青\n山、江上渔舟，天空白鹭、岸畔桃红，江水猛\n涨，鱼正肥时：青若笠，绿蓑衣，渔人醉垂忘\n归时\n全词着色明丽，用语活泼，生动地表现了渔夫悠\n闲自在的生活情趣\n这是一幅用诗写成的山水画，这是一首色彩明优\n意万千，脱离尘俗钓湖烟\n思深韵远情融景，生活任行乐自然的抒情诗\n白话文：\n西塞山前白鹭在自由地翔，江水中，肥美的\n鱼欢快地游着，漂浮在水中的桃花是那样的鲜艳\n而饱满\n渔翁头戴青色的箬笠，身披绿色的衣，冒着斜\n风细雨，乐然垂钓，用不着回家\n---", "grid": null, "image": null}, {"num": 69, "type": "单选题", "stem": "七夕今宵看____，牵牛织女渡河桥。", "options": ["A.碧宵", "B.碧霄", "C.绿宵", "D.绿霄"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友你好呀！老师看到这道题了，这是一\n首描写七夕节的名诗。别急，我们一起把这\n个拦路虎\"拿下！\n我们先来还原一下画面，闭上眼睛哦：七月初七\n的夜晚，大家都抬头望向那深蓝深蓝的夜空，因\n为今晚，分隔在银河两边的牛郎和织女，终于要\n在鹊桥上相会啦！\n因此，这句诗填的是B.碧霄。原诗是林杰的\n《乞巧》：“七夕今宵看碧霄，牵牛织女渡河\n桥。“\n这里面有个特别容易踩的“坑”，我们来看看你为\n什么会纠结：\n·错题诊疗室\n很多小朋友会选A“碧宵”。你看这两个字\n长得像不像双胞胎？\n宵（宝盖头）：它和夜“是好朋友。你想\n啊，晚上是不是要看星星月亮？所以，\n元\"宵“节是晚上吃汤圆，通“宵”是一整夜\n不睡。这里的“今宵”，指的就是“今天晚\n上“。\n霄（雨字头）：它和天“是好朋友。雨是\n从云里落下来的，所以霄“指的是高高的\n天空，云“霄”、九重“霄”。诗里的“碧\n霄”，就是形容那像碧玉一样清澈的夜空。\n举一反三小窍门\n下次再遇到它们，只要问自己：“这里有月\n亮吗？“如果是在说晚上、夜里，就用宝盖\n头的“宵”：如果是在说高高的天空、云\n震，就用雨宇头的“霄”。\n记住了吗？选出“碧霄“真棒，说明你仔细\n思考了呢！继续加油，老师相信下次你一\n定能一眼分清它们！\n试题解析：\n《乞巧》\n作者：林杰\n朝代：唐代\n七夕今宵看碧霄，牵牛织女渡河桥。\n家家乞巧望秋月，穿尽红丝几万条。\n赏析：\n《乞巧》是唐代人林杰描写民间七夕乞巧盛况的\n诗。农历七月初七夜晚，俗称“七夕”，又称“女儿\n节少女节”。是传说中隔着“天河“的牛郎和织女\n在鹊桥上相会的日子。乞巧，就是向织女乞求一\n双巧手的意思。\n乞巧最普遍的方式是对月穿针，如果线从针孔穿\n过，就叫得巧。“七夕今霄看碧霄，牵牛织女渡\n河桥。“碧霄“指浩瀚无际的青天。开头两句叙述\n的就是牛郎织女的民间故事。\n一年一度的七夕又来到了，家家户户的人们纷纷\n情不自禁地抬头仰望浩瀚的天空，这是因为这一\n美丽的传说牵动了一颗颗善良美好的心灵，唤起\n人们美好的原望和丰富的想象。\n---", "grid": null, "image": null}, {"num": 70, "type": "十二宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "绿遍山原白满川", "analysis": "AI解析（仅供参考）：\n太棒了，你有一双善于发现的眼睛！这几个字混\n在一起，就像调皮的小精灵在捉迷藏，让我们一\n起来把它们“抓“回诗句里吧。\n我们先看这一串字：“山原风岸遍白川春绿又江\n满”，你试着读一读，有没有觉得“绿、遍、山、\n原、白、满、川这几个字特别亮眼？把它们连\n起来，是不是就成了一—绿遍山原白满川？\n没错，这正是宋代诗人翁卷《乡村四月》里的名\n句。你看，诗人像一位高明的画师，用一\n个“绿“字刷满了山坡和平原，又用一个白“字点\n出了涨满河川的水光，满眼都是初夏生机勃勃的\n颜色。\n你的思维误区可能是：看到春、风、又\n绿、江、岸“立刻想到了更熟悉的“春风又绿江南\n岸”，就急着去拼凌，结果发现少了个“南“字，卡\n住啦。其实出题老师正是利用这个“陷阱”，考验\n我们专心辨别，而不是凭着印象盲猜。记住这个\n巧办法：先圈出能组成常见意象的宇（比如颜色\n+景物），再对照库存诗句，就不会被干扰项带\n偏了。\n你今天的挑战很有价值，错一次就多一根金箍\n棒！下次遇到这种文字排列题，你一定会像小侦\n探一样冷静。继续保持你的好奇心哦~\n试题解析：\n《乡村四月》\n作者：翁卷\n朝代：宋代\n绿遍山原白满川，子规声里雨如烟。\n乡村四月闲人少，才了蚕桑又插田。\n赏析：\n这首诗以白描手法写江南农村（今乐清市淡溪\n镇）初夏时节的景象，前两句着重写景：绿原、\n白川、子规、烟雨，寥寥几笔就把水乡初夏时特\n有的景色勾勒了出来。\n白话文：\n山坡田野间草木茂盛，稻田里的水色与天光相辉\n映。天空中烟雨蒙蒙，杜鹃声声啼叫，大地一片\n欣欣向荣的景象。\n四月到了，没有人闲着，刚刚结束了蚕桑的事又\n要插秧了。\n---", "grid": {"slots": 7, "rows": [["山", "原", "风", "岸"], ["遍", "白", "川", "春"], ["绿", "又", "江", "满"]]}, "image": null}, {"num": 71, "type": "判断题", "stem": "胡令能《小儿垂钓》“蓬头稚子学垂 纶\"中\"蓬头\"是形容垂钓的小孩子可 爱。", "options": ["A. 正确", "B. 错误"], "answer": "A", "analysis": "AI解析（仅供参考）：\n小朋友，别急着看答案，咱们先一起走进胡令能\n爷爷的诗里，看看那个钓鱼的小娃娃到底有多可\n爱，好吗？\n还原画面\n想象一下：一个小男孩，头发乱蓬蓬的，像刚钻\n出被窝的小鸟窝。他学着大人的样子，一本正经\n地侧坐在长满青苔的河边，手里紧紧擦着鱼竿。\n旁边有路人想向他问路，他急得拼命摆手一—不\n是不想理你，是怕惊跑了水里的小鱼呀！\n你看，这个“蓬头“是不是特别生动？它并不是说\n孩子脏兮兮的，而是像现代爸爸妈妈拍照时故意\n把孩子头发揉乱，觉得那种自然、稚嫩的样子最\n萌。诗人用这个词，正是抓住了小孩子不在乎打\n扮、一门心思钓鱼的憨态，让人觉得又可爱又好\n笑。\n哪里容易想错？\n有些同学会误以为“蓬头“是批评孩子不讲卫生\n那就掉进坑啦。在古诗里，描写孩子“蓬头“往往\n是为了突出他们天真烂漫、不拘小节的童趣，是\n一种充满爱意的形容。就像你玩得太开心忘了梳\n头，妈妈嘴里说小疯子”，眼里却全是疼爱。\n所以，题目说“蓬头是形容垂钓的小孩子可爱”，\n完全正确！\n小窍门记心里\n以后遇到描写儿童外貌的诗句，先别急着用大人\n的标准去判断美丑。多想想：这是不是在夸孩子\n天真、活泼、专注？像“蓬头“赤脚“这样的词，\n常常是诗人送给小主角的可爱滤镜哦。\n你真是个细心的孩子，能注意到这么生动的细\n节。继续保持，你会从古诗里发现越来越多藏在\n字缝里的童趣！下次钓到新问题，随时抛给我\n呀。\n试题解析：\n《小儿垂钓》\n作者：胡令能\n朝代：唐代\n蓬头稚子学垂纶，侧坐莓苔草映身。\n路人借问遥招手，怕得鱼惊不应人。\n赏析：\n《小儿垂钓》是一首以儿童生活为题材的作，诗\n写一“蓬头稚子“学钓鱼，“侧坐莓苔草映身”，路\n人向小儿招手，想借问打听一些事情，那小儿\n却“怕得鱼惊不应人”（怕惊了鱼而不置一词），\n真是活灵活现、惟妙惟肖，形神兼备，意趣蛊\n然。其艺术成就丝毫不亚于杜牧著名的《清明》\n一诗。\n白话文：\n一个头发蓬乱、面孔青嫩的小孩在河边学钓鱼，\n侧着身子坐在草丛中，野草掩映了他的身影。\n听到有过路的人问路，小孩漠不关心地摆了摆\n手，生怕惊动了鱼儿，不敢回应过路人。\n---", "grid": null, "image": null}, {"num": 72, "type": "判断题", "stem": "《渔歌子》是宋代诗人张志和写的一 首词。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n哎呀，小朋友，别着急，这道题其实是给我们挖\n了一个小小的“时间陷阱“哦～我们一起来把\n它揪出来！\n先来认识一下“渔歌子“这位好朋友\n你能想象吗？在很久很久以前的江南水乡，有位\n穿着衣、戴着斗笠的老爷爷，在细细的斜风细\n雨中悠闲地钓鱼，连家都不想回。这幅画，就是\n《渔歌子》带给我们的。\n这道题哪里不对劲？\n你仔细看，题目说张志和是“宋代”诗人，我们\n就在这里被绊倒啦！\n其实呀，张志和生活在唐代，他不仅是个诗\n人，还是个很会画画的隐士。他把这首词写得像\n一幅清丽的水墨画，后来很多厉害的人，比如苏\n轼，都喜欢得不得了，还照着改写过呢！\n正确的说法应该是：\n《渔歌子》是唐代诗人张志和写的一首词。\n为什么容易记错？因为渔歌子“这个词牌名在宋\n代也很流行，好多宋代词人都填过，但首创它并\n且写得最出名的，还是唐代的张志和。千万不能\n把词牌名常有，就错把诗人穿越到宋朝去哦！\n送你一个小窍门\n以后遇到这种题，记住这个小口诀：张冠不能宋\n戴，唐朝渔父最自在！想到那个在斜风细雨里\n不慌不忙的钓鱼爷爷，就马上联想到他就是唐代\n的张志和啦。\n相信下次你再见到这道题，一定能火眼金睛地发\n现错误！你很棒，加油～\n试题解析：\n张志和是唐代诗人\n---", "grid": null, "image": null}, {"num": 73, "type": "判断题", "stem": "刘禹锡，唐代著名诗人，代表作有 《望洞庭》《浪淘沙》和《宿建德 江》。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友你好呀！别灰心，这道题里藏着一个最常\n见的“张冠李戴小陷阱，咱们一起来把它揪出来\n吧！\n你试着想一想，如果提到“移舟泊烟渚，日暮客\n愁新”，是不是马上浮现出一叶小船停靠在烟雾\n迷蒙的小洲边？那种淡淡的孤独感，其实是唐代\n诗人孟浩然在他著名的《宿建德江》里描绘的。\n而咱们的刘属锡，外 “夜静春山空”。是不是刚好用到\n了“夜、静、春、山、空“这五个字？其他几个\n字“气、天、晚、秋是来当\"小迷雾“的，迷惑我\n们呢！\n这句诗出自王维的《鸟鸣涧》。诗人用“夜静“写\n出深山的幽静，“春山空又把那种空旷悠远的感\n觉一下子拉到你眼前。如果以后你看到一堆字要\n拼诗句，可以试试先找找里面最有画面感的名词\n（比如山、夜、春），再慢慢加上形容词，像搭\n积木一样，一句诗就立起来啦！\n你刚才可能被“晚“和“秋带跑了，因为它们也很\n像诗里的字，对不对？这就是出题老师的小陷\n阱，你能识破它，就超级棒了！\n继续加油哦，下次你也能一眼看穿这些乱序诗\n谜”，因为你已经掌握了“画面拼图法”\n试题解析：\n《鸟鸣涧》\n作者：王维\n朝代：唐代\n人闲桂花落，夜静春山空。\n月出惊山鸟，时鸣春涧中。\n赏析：\n关于这首诗中的桂花，颇有些分歧意见。一种解\n释是桂花有春花、秋花、四季花等不同种类，此\n处所写的当是春日开花的一种。另一种意见认为\n文艺创作不一定要照搬生活，传说王维画的《袁\n安卧雪图》，在雪中还有碧绿的芭蕉，现实生活\n中不可能同时出现的事物，在文艺创作中是允许\n的。\n不过，这首诗是王维题友人所居的《呈甫岳云溪\n杂题五首》之一。五首诗每一首写一处风景，接\n近于风景写生，而不同于一般的写意画，因此，\n以解释为山中此时实有的春桂为妥。\n白话文：\n寂无人声，芬芳桂花，轻轻飘落。青山碧林，更\n显空寂。\n明月升起，惊动几只栖息山鸟。清脆鸣叫，长久\n回荡空旷山涧。\n---", "grid": {"slots": 5, "rows": [["夜", "气", "山"], ["空", "天", "晚"], ["静", "秋", "春"]]}, "image": null}, {"num": 76, "type": "单选题", "stem": "以下诗作中，与《九月九日忆山东兄弟》是同一作者的一项是____", "options": ["A.《大林寺桃花》", "B.《乡村四月》", "C.《赠刘景文》", "D.《鸟鸣涧》"], "answer": "D", "analysis": "AI解析（仅供参考）：\n小朋友，别灰心哦，这道题考的是诗人的“朋友\n圈”，我们一起来把王维爷爷找出来吧！\n我们先回到《九月九日忆山东兄弟》的画面：重\n阳节那天，一个少年独自在异乡，看着别人插茱\n英、登高，心里酸酸的。这就是王维17岁时写下\n的思念。他就像一位能把心事说成画的诗人。\n来看看哪位老爷爷才是王维的好朋友：\n·A.《大林寺桃花》：“人间四月芳菲尽，山\n寺桃花始盛开”，这是白居易爷爷在山寺发\n现的春天秘密。\nB.《乡村四月》：“绿遍山原白满川，子规\n声里雨如烟”，翁卷爷爷带我们看江南烟\n雨。\nC.《赠刘景文》：“一年好景君须记，最是\n橙黄橘绿时”，苏轼爷爷在给好朋友打气\n呢。\nD.《鸟鸣涧》：“人闲桂花落，夜静春山\n空。月出惊山鸟，时鸣春涧中。“——\n你闻\n到了静夜里的桂花香，听到了山涧鸟鸣\n吗？这就是王维爷爷呀！\n你可能会掉进的\"小陷阱”：\n很多小朋友会被c项迷惑，想着“赠“字像思念\n就选了苏轼。但《赠刘景文》是鼓励朋友的，作\n者是宋代大文豪苏东坡：而《九月九日忆山东兄\n弟》是唐代诗人王维思念家人的。他们跨越朝\n代，可不能握手哦。\n推导小窍门：\n王维的作品，常常像一幅水墨动画，有“空\n山”\"鸟鸣”月色”这些清幽的画面。以后碰到这\n种“谁是谁的诗“的题目，可以试若连一连朝代和\n诗人的“超能力\"：王维=诗中有画，白居易=明\n白如话，苏轼=哲理达观。这样就不会迷路啦！\n记住这个小技巧，下次你就能像小侦探一样，从\n诗里的气味和颜色，一眼认出作者！\n试题解析：\n《鸟鸣涧》\n作者：王维\n朝代：唐代\n人闲桂花落，夜静春山空。\n月出惊山鸟，时鸣春润中。\n赏析：\n关于这首诗中的桂花，颇有些分歧意见。一种解\n释是桂花有春花、秋花、四季花等不同种类，此\n处所写的当是春日开花的一种。另一种意见认为\n文艺创作不一定要照搬生活，传说王维画的《袁\n安卧雪图》，在雪中还有碧绿的芭蕉，现实生活\n中不可能同时出现的事物，在文艺创作中是允许\n的。\n不过，这首诗是王维题友人所居的《皇甫岳云溪\n杂题五首》之一。五首诗每一首写一处风景，接\n近于风景写生，而不同于一般的写意画，因此，\n以解释为山中此时实有的春桂为妥。\n白活文\n---", "grid": null, "image": null}, {"num": 77, "type": "单选题", "stem": "王昌龄《从军行》“青海长云暗雪 山\"中的\"雪山\"指的是什么山？", "options": ["A.阴山", "B.祁连山", "C.华山", "D.雪峰山"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友，不用着急，咱们一起把这道题弄明白！\n你瞧，边塞诗人就像一位导演，要带咱们去看西\n北的壮丽风光呢。\n先闭上眼想象这幅画面：范茫青海湖上，浓云翻\n涌，把远处的山脉都遮得暗淡无光。那座神秘的\n山就是“雪山”。诗人王昌龄当时在青海一带从\n军，他看到的可不是一般的山。青海边上最高的\n山脉，山顶终年都是白皓的积雪，在阳光下闪\n闪发光，这就是祁连山。“祁连“在匈奴语里就\n是天“的意思，可见它多高多大。所以，正确答\n案是B祁连山。\n那为啥有些同学会选A阴山呢？因为阴山也是\n边塞诗里的大明星，比如不教胡马度阴山”。但\n阴山在内蒙古，离青海远着呢。至于华山（C）\n和雪峰山（D），一个在陕西，一个在湖南，都\n不在西北边塞，所以不会出现在这句诗里。\n记住一个小窍门：读边塞诗时，找出诗中的地名\n线索！“青海“就是提示，它旁边就是祁连山。下\n次遇到类似题目，先在地图上给诗人的眼睛定个\n位，景色就不会认错啦。\n你这次虽然没有直接问错题，但我猜你可能在这\n个选项上犹豫过。没关系的，每一次思考都在帮\n你把古诗读得更透。继续加油，你一定能成为诗\n词小行家！\n试题解析：\n《从军行》\n作者：杨炯\n朝代：唐代\n烽火照西京，心中自不平。\n牙璋辞凤阙，铁骑绕龙城。\n雪暗凋旗画，风多杂鼓声。\n宁为百夫长，胜作一书生。\n赏析：\n这首诗借用乐府旧题“从军行”，描写一个读书士\n子从军边塞、参加战斗的全过程。仅仅四十个\n字，既揭示出人物的心理活动，又谊染了环境气\n氛，笔力极其雄劲。\n第三句“牙璋辞凤阙”，描写军队辞京出师的情\n景。\n五六两句开始写战斗，诗人却没有从正面着笔，\n而是通过景物描写进行烘托。\n诗人别具机抒，以象征军队的“旗“和“鼓”，表现\n出征将士冒雪同敌人搏斗的坚强无畏精神和在战\n鼓声激励下奋勇杀敌的悲壮激烈场面。诗的最后\n两句：“宁为百夫长，胜作一书生。“直接抒发从\n戎书生保边卫国的壮志豪情。\n艰苦激烈的战斗，更增添了他对这种不平凡的生\n活的热爱，他宁愿驰骋沙场，为保卫边疆而战，\n也不愿作置身书斋的书生。\n白话文：\n烽火照耀京都长安，不平之气油然而生。\n77 /85\n---", "grid": null, "image": null}, {"num": 78, "type": "十二宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "北风吹雁雪纷纷", "analysis": "AI解析（仅供参考）：\n同学，你好呀！别急，咱们先来玩个文字捉迷\n藏“的小游戏～\n你看这些字：“恨六雁细根纷风吹雪北纷必”，乍\n一看是乱码，但我们把它们当作拼图碎片，试着\n拼一拼。你想想，有\"北\"有”风“有“雁“有“雪”，还\n有两个“纷”.有没有联想到哪首写冬天的古\n诗？\n对啦！就是高适的《别董大》：“北风吹雁雪纷\n纷”。我们还原一下场景：诗人站在昏暗的暮色\n里，漂冽的北风呼呼地刮，大雁顶着风艰难地\n飞，鹅毛大雪纷纷扬扬洒落。多壮阔又带点凄凉\n的画面呀！\n你可能会疑惑，“恨“和\"六“这些混进来“的字去\n哪了？其实呀，出题人像淘气的小精灵，把完整\n诗句拆散，还掺了几个形近字打扰你。你只要抓\n住关键意象—“北风”雁雪纷纷”，就能拨开\n迷套啦。\n记住这个小窍门：以后遇到这类题，先找诗里最\n亮眼的“主题词”（比如季节、动物、天气），再\n像串糖葫芦一样把它们串成七宇句，常见名句就\n自己冒出来咯。\n你已经很棒了，能从一堆伪装者“里揪出正确答\n案！继续加油，古诗文就像魔法世界，等着你去\n探索呢～\n试题解析：\n《别董大二首》\n作者：高适\n朝代：唐代\n千里黄云白日，北风吹雁雪纷纷。\n莫愁前路无知己，天下谁人不识君？\n六翻飘钢私自怜，一离京洛十余年。\n丈夫贫贱应未足，今日相逢无酒钱。\n赏析：\n在唐人赠别诗篇中，那些凄清缠绵、低徊留连的\n作品，固然感人至深，但另外一种慷概悲歌、出\n自肺的诗作，却又以它的真诚情谊，坚强信\n念，为漏桥柳色与渭城风雨涂上了另一种豪放健\n美的色彩\n高适的《别董大二首》便是后一种风格的佳篇\n这两首送别诗作于公元747年（天宝六年），当\n时高适在雕阳，送别的对象是著名的琴师董庭兰\n盛唐时盛行胡乐，能欣赏七弦琴这类古乐的人不\n崔珏有诗道：“七条弦上五音寒，此艺知音自古\n惟有河南房次律，始终怜得董庭兰\n这时高适也很不得志，到处浪游，常处于贫贱\n的境 let current = 0;

const results = {};

const TIMER_SECONDS = 30;
let timerInterval = null;
let timerStart = null;

function startTimer() {
  clearInterval(timerInterval);
  timerStart = Date.now();
  let remaining = TIMER_SECONDS;
  updateTimerDisplay(remaining);
  timerInterval = setInterval(() => {
    remaining--;
    updateTimerDisplay(remaining);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      if (!answered) {
        timings[current] = { elapsed: TIMER_SECONDS, timeout: true };
        autoSubmit();
      }
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  if (timerStart !== null) {
    const elapsed = Math.min(Math.round((Date.now() - timerStart) / 1000), TIMER_SECONDS);
    if (!timings[current]) timings[current] = { elapsed, timeout: false };
    timerStart = null;
  }
}

function updateTimerDisplay(remaining) {
  const el = document.getElementById('timer');
  if (!el) return;
  el.textContent = `⏱ ${remaining}s`;

  const grid = document.getElementById('nav-grid');
  grid.innerHTML = questions.map((q, i) =>
    `<button class="nav-btn" id="nav-${i}" onclick="jumpTo(${i})">${i+1}</button>`
  ).join('');
}

function updateNav() {
  questions.forEach((_, i) => {
    const btn = document.getElementById('nav-' + i);
    btn.className = 'nav-btn';
    if (i === current) btn.classList.add('active');
    if (results[i] === true) btn.classList.add('correct');
    else if (results[i] === false) btn.classList.add('wrong');
  });
}

function jumpTo(idx) {
  stopTimer();
  current = idx;
  render(idx);
}

function buildGridHtml(grid, answeredInput) {
  const slots = grid.slots;
  // 红色答案槽
  let slotsHtml = '<div class="grid-slots" id="grid-slots">';
  for (let i = 0; i < slots; i++) {
    const ch = answeredInput ? answeredInput[i] || '' : '';
    slotsHtml += `<div class="grid-slot${ch ? ' filled' : ''}" id="slot-${i}" onclick="removeSlot(${i})">${ch}</div>`;
  }
  slotsHtml += '</div>';
  // 候选字格
  let candidatesHtml = '<div class="grid-candidates" id="grid-candidates">';
  for (const row of grid.rows) {
    candidatesHtml += '<div class="grid-row">';
    for (const ch of row) {
      const used = answeredInput && answeredInput.includes(ch) &&
                   answeredInput.split('').filter(c=>c===ch).length >=
                   row.filter(c=>c===ch).length;
      candidatesHtml += `<div class="grid-cell${answeredInput ? ' disabled' : (used ? ' used' : '')}"
        data-char="${ch}" onclick="fillSlot('${ch}', this)">${ch}</div>`;
    }
    candidatesHtml += '</div>';
  }
  candidatesHtml += '</div>';
  return slotsHtml + candidatesHtml;
}

let gridInput = [];  // 当前宫格已填入的字

function fillSlot(ch, el) {
  if (answered || el.classList.contains('used') || el.classList.contains('disabled')) return;
  const q = questions[current];
  if (gridInput.length >= q.grid.slots) return;
  gridInput.push(ch);
  el.classList.add('used');
  const idx = gridInput.length - 1;
  const slot = document.getElementById('slot-' + idx);
  slot.textContent = ch;
  slot.classList.add('filled');
}

function removeSlot(idx) {
  if (answered) return;
  if (idx >= gridInput.length) return;
  gridInput.splice(idx, 1);
  const q = questions[current];
  for (let i = 0; i < q.grid.slots; i++) {
    const slot = document.getElementById('slot-' + i);
    const ch = gridInput[i] || '';
    slot.textContent = ch;
    slot.classList.toggle('filled', !!ch);
  }
  refreshCandidateUsed();
}

function removeSlot(idx) {
  if (answered) return;
  if (idx >= gridInput.length) return;
  // 找到对应候选字格，取消 used
  const removedChar = gridInput[idx];
  gridInput.splice(idx, 1);
  // 重新渲染槽
  const q = questions[current];
  for (let i = 0; i < q.grid.slots; i++) {
    const slot = document.getElementById('slot-' + i);
    const ch = gridInput[i] || '';
    slot.textContent = ch;
    slot.classList.toggle('filled', !!ch);
  }
  // 重置候选字格的 used 状态（重新计算）
  refreshCandidateUsed();
}

function refreshCandidateUsed() {
  const cells = document.querySelectorAll('.grid-cell');
  // 统计 gridInput 里每个字的使用次数
  const usedCount = {};
  for (const ch of gridInput) usedCount[ch] = (usedCount[ch] || 0) + 1;
  // 对每个候选格，按同字出现顺序决定是否标 used
  const seen = {};
  cells.forEach(cell => {
    const ch = cell.dataset.char;
    seen[ch] = (seen[ch] || 0) + 1;
    cell.classList.toggle('used', seen[ch] <= (usedCount[ch] || 0));
  });
}

function render(idx) {
  answered = idx in results;
  gridInput = [];
  const q = questions[idx];
  const total = questions.length;
  document.getElementById('progress').textContent = `第 ${idx+1} / ${total} 题`;

  const isGrid = !!q.grid;
  let bodyHtml = '';

  if (isGrid) {
    const answeredInput = answered ? q.answer : null;
    bodyHtml = `<div class="grid-wrap">${buildGridHtml(q.grid, answeredInput)}</div>`;
    if (answered) gridInput = q.answer.split('');
  } else {
    const optHtml = q.options.map((opt, i) => {
      const letter = opt.match(/^([A-D])/)?.[1] || String.fromCharCode(65+i);
      const text = opt.replace(/^[A-D][\.．。]\s*/, '');
      return `<div class="option" data-letter="${letter}" onclick="select(this)">
        <span class="label">${letter}</span><span>${text}</span>
      </div>`;
    }).join('');
    bodyHtml = `<div class="options" id="options">${optHtml}</div>`;
  }

  document.getElementById('card').innerHTML = `
    <div class="tag">${q.type}<span id="timer" class="timer" ${answered ? 'style="display:none"' : ''}>⏱ ${TIMER_SECONDS}s</span></div>
    <div class="stem">${q.stem}</div>
    ${q.image ? `<img class="question-img" src="${q.image}">` : ''}
    ${bodyHtml}
    <div class="btn-row">
      <button class="btn btn-submit" id="btn-submit" onclick="submit()" ${answered ? 'style="display:none"' : ''}>提交答案</button>
      <button class="btn btn-next" id="btn-next" onclick="next()" ${answered ? '' : 'style="display:none"'}>
        ${idx < total-1 ? '下一题 →' : '完成 ✓'}
      </button>
    </div>
    <div class="result ${answered ? 'show ' + (results[idx] ? 'ok' : 'fail') : ''}" id="result">
      ${answered ? (results[idx] ? '✅ 回答正确！' : `❌ 回答错误，正确答案是：${q.answer}`) : ''}
    </div>
    <div class="analysis ${answered ? 'show' : ''}" id="analysis">
      <div class="analysis-title">📖 解析</div>
      ${q.analysis}
    </div>
  `;

  if (!isGrid && answered) {
    document.querySelectorAll('.option').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === q.answer) o.classList.add('correct');
    });
  }

  if (isGrid && answered) {
    const isOk = results[idx];
    document.querySelectorAll('.grid-slot').forEach(s => {
      s.classList.add(isOk ? 'correct' : 'wrong');
    });
  }

  if (!answered) startTimer();
  updateNav();
}

function select(el) {
  if (answered) return;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function submit() {
  if (answered) return;
  const q = questions[current];
  const isGrid = !!q.grid;
  answered = true;
  stopTimer();

  if (isGrid) {
    if (gridInput.length < q.grid.slots) { answered = false; alert('请先填满所有格子'); return; }
    const userAns = gridInput.join('');
    const isOk = userAns === q.answer;
    results[current] = isOk;
    document.querySelectorAll('.grid-slot').forEach(s => s.classList.add(isOk ? 'correct' : 'wrong'));
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.add('disabled'));
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : `❌ 回答错误，正确答案是：${q.answer}`;
  } else {
    const selected = document.querySelector('.option.selected');
    if (!selected) { answered = false; alert('请选择一个答案'); return; }
    const chosen = selected.dataset.letter;
    const correct = q.answer;
    document.querySelectorAll('.option').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === correct) o.classList.add('correct');
      else if (o.dataset.letter === chosen) o.classList.add('wrong');
    });
    const isOk = chosen === correct;
    results[current] = isOk;
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : `❌ 回答错误，正确答案是 ${correct}`;
  }

  document.getElementById('analysis').classList.add('show');
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
  const timerEl = document.getElementById('timer');
  if (timerEl) timerEl.style.display = 'none';
  updateNav();
}

function next() {
  stopTimer();
  current++;
  if (current >= questions.length) {
    const correct = Object.values(results).filter(v => v === true).length;
    const total = questions.length;
    document.getElementById('progress').textContent = '';
    document.getElementById('card').innerHTML = `
      <div class="finish">
        <h2>🎉 全部完成！</h2>
        <p>共 ${total} 题，答对 ${correct} 题，答错 ${total - correct} 题</p>
        <p>正确率：${Math.round(correct/total*100)}%</p>
      </div>`;
    updateNav();
  } else {
    render(current);
  }
}

function downloadResults() {
  const now = new Date();
  const dateStr = now.toLocaleString('zh-CN');
  const data = questions.map((q, i) => {
    const t = timings[i] || {};
    return {
      题号: q.num,
      题型: q.type,
      题干: q.stem,
      正确答案: q.answer,
      结果: results[i] === true ? '正确' : results[i] === false ? '错误' : '未作答',
      用时秒: t.elapsed ?? '-',
      超时: t.timeout ? '是' : '否',
    };
  });
  const correct = Object.values(results).filter(v => v === true).length;
  const output = {
    答题时间: dateStr,
    总题数: questions.length,
    答对: correct,
    答错: questions.length - correct,
    正确率: Math.round(correct / questions.length * 100) + '%',
    明细: data,
  };
  const blob = new Blob([JSON.stringify(output, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `答题记录_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

buildNav();
render(0);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
