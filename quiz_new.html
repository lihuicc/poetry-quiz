<style>

  .btn:disabled { opacity: 0.4; cursor: default; }

  .btn-next:hover:not(:disabled) { background: #388e3c; }
  .result { margin-top: 16px; padding: 14px 16px; border-radius: 8px;
             font-size: 15px; display: none; }
  .result.show { display: block; }
  .result.ok { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }

  .finish p { color: #666; font-size: 15px; margin-bottom: 8px; }
  .timer { display: inline-block; font-size: 13px; font-weight: 600; padding: 2px 10px;
            border-radius: 20px; background: #e3f2fd; color: #1976d2; margin-left: 10px; }
  .timer.warning { background: #fff3e0; color: #e65100; }
  .timer.danger { background: #ffebee; color: #c62828; }
  .question-img { display: block; max-width: 50%; border-radius: 8px;
                   margin: 0 auto 20px; }

  .grid-wrap { margin-bottom: 20px; }
  .grid-slots { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }

  .grid-slot.correct { background: #43a047; border-color: #388e3c; }
  .grid-slot.wrong { background: #e53935; border-color: #c62828; animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .grid-candidates { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .grid-row { display: flex; gap: 6px; }
  .grid-cell { width: 52px; height: 52px; background: #f5f5f5; border-radius: 8px;

               border: 2px solid #e0e0e0; transition: all 0.15s; user-select: none; }
  .grid-cell:hover:not(.used):not(.disabled) { background: #e3f2fd; border-color: #1976d2; }
  .grid-cell.used { opacity: 0.3; cursor: default; }
  .grid-cell.disabled { cursor: default; }
</style>

从下列文字中找出一句古诗词。", "options": [], "answer": "日暮客愁新", "analysis": "AI解析（仅供参考）：\n哇，亲爱的同学，是不是被这堆字绕星了？别\n急，咱们一起当一回文字侦探，把这些宇像拼\n图一样拼起来！\n第一步：走进画面，找找感觉。\n你想象一下，太阳快要落山了（暮、日），\n人在外地做客（客），心里有点不开心（愁），\n好像一切都是新的陌生感（新）。有没有觉得这\n很像一个游子写的诗？\n第二步：火眼金晴，锁定原句。\n我们把这些字排排邦队，试试能不能组成一句你学\n过的古诗。你看，“日“和“暮“都和傍晚有\n关，“客“和“愁“是心情。记得孟浩然那首《宿建\n德江》吗？里面有一句特别有名，正好五个字：\n日暮客愁新。\n我们核对一下：日（有）、暮（有）、客\n（有）、愁（有）、新（有）。全都有！剩下\n的“孤”漠”大”烟“是调皮的小石子，专门来迷惑\n我们的。\n第三步：为什么你刚才可能被绕进去了？\n很多小朋友看到“大漠“孤烟”，马上脑子里就蹦\n出“大漠孤烟直”，结果发现没有\"直“字，就卡住\n了。这就是思维定势在捣蛋！做这种题的小窍门\n是：不要急着套最熟悉的诗句，先看看所有字能\n拼出什么完整的意思。\n你学会了吗？下次再遇到九宫格、十六宫格拼诗\n题，就像这样先确定意境，再找名词和情感词配\n对。加油，你离诗词小达人又近了一步！\n试题解析：\n《宿建德江》\n作者：孟浩然\n朝代：唐代\n移舟泊烟渚，日暮客愁新。\n野旷天低树，江清月近人。\n赏析：\n这首诗不以行人出发为背景，也不以船行途\n中为背景，而是以舟泊暮宿为背景。它虽然露出\n一个“愁\"字，但立即又将笔触转到景物描写上去\n了。可见它在选材和表现上都是很有特色的。诗\n的起句“移舟泊烟”，“移舟”，就是移舟近岸的\n意思；“泊”，这里有停船宿夜的含意。行船停靠\n在江中的一个烟朦胧的小洲边，这一面是点\n题，另一面也就为下文的写景抒情作了准备。\n第二句“日暮客愁新”中的“日暮“显然和上句\n的“泊”、“烟“有联系，因为日暮，船需要停宿；\n也因为里的一段：“君子于役，不知其期，易至\n哉？鸡栖于，日之夕矣，羊牛下来，君子于\n役，如之何勿思？”（《诗经王风君子于役》）\n这里写一位妇女，每当到夕阳西下、鸡进笼舍、\n牛羊归栏的时刻，她就更加思念在外服役的丈\n夫。\n远处的天空显得比近处的树木还要\n低，“低“和“旷“是相互依存、相互映衬的。第四\n句写夜已降临，高挂在天上的明目，映在澄清的\n---", "grid": {"slots": 5, "rows": [["暮", "孤", "漠"], ["日", "新", "烟"], ["客", "大", "愁"]]}, "image": null}, {"num": 4, "type": "判断题", "stem": "“采菊东篱下，悠然见南山。“出自东 晋诗人陶渊明的《归园田居》。", "options": ["A. 正确", "B. 错误"], "answer": "B", "analysis": "AI解析（仅供参考）：\n亲爱的同学，你好呀！别急别急，咱们来看\n看这道题。\n你能准确地背出这句“采菊东篇下，悠然见南\n山“真的非常棒，说明平时积累很扎实哦！不\n过，这道题是一个小小的“陷阱”，它是错的哦。\n咱们先来“入境“想一想：\n想象一下，陶渊明伯伯结束了一天的劳作，在东\n边的篱芭下随手摘了几朵菊花。一抬头，恰好与\n远处美丽的南山撞个满怀。山和人的心境都那么\n悠闲自在。这画面是不是很随性、很惬意？\n问题出在哪里呢？\n问题不在诗的内容，而在诗的”户籍”上！\n很多同学都会把陶渊明的两首超有名的诗搞混：\n《饮酒·其五》：讲的是诗人在“此刻”\n边喝酒一边赏景，忽然间悟到的隐居乐\n趣。我们这道题的诗句，就来自这首，强\n调的是一种偶遇的心情。\n《归园田居》：讲的是诗人在“回忆”枯燥\n的官场和描写自己种地拔草的生活，更像\n是在开心地说我终于回来啦”！\n这里有个小窍门哦：\n你可以这样记—诗句里带着一种“悠悠\n然“的闲适，就像喝了点小酒后心花怒放的\n状态，所以它属于《饮酒》。记住了吗？\n很棒啦，至少比上次又分清了一个易错\n点！继续加油，你读诗的画面感会越来越\n强的。下次遇到它们，你一定能一眼识\n破！\n---", "grid": null, "image": null}, {"num": 5, "type": "单选题", "stem": "有这样一幅对联：有志者，事竟成， 破釜沉舟，百二秦关终属楚；苦心 人，天不负，卧薪尝胆，三千越甲可 吞吴。对联里包含了哪两个历史人 物？", "options": ["A.刘邦，勾践", "B.项羽，勾践", "C.秦始皇，夫差"], "answer": "B", "analysis": "AI解析（仅供参考）：\n小朋友，你好呀！别因为这道题皱眉头，咱们一\n起把它变成一个小故事，好不好？\n你看这副对联，就像两幅会动的历史画。上\n联“破釜沉舟，百二秦关终属楚”，说的是一个人\n把做饭的锅砸了、把渡河的船沉了，告诉自\n已“没退路了，必须赢”。这个超级有勇气的人是\n谁呢？他就是西楚霸王项羽。下联“卧薪尝胆\n三千越甲可吞吴，画的是另一个人每天睡在柴\n火上、尝苦胆，提醒自己不忘耻辱，最后用很\n少的兵就灭掉了强大的吴国。这个坚韧不拔的\n人，是越王勾践。\n很多小朋友会误选A（刘邦、勾践），可能是因\n为把刘邦和项羽争天下的故事记混了，但“破釜\n沉舟“这一个招牌动作，可是项羽的专利哦！下\n次碰到这类题，我们可以玩一个“对号入座“的游\n戏：把典故里的特色动作（砸锅、苦胆）和人\n物牢牢绑在一起，像你的好朋友有个独一无二的\n外号一样，就不容易张冠李戴啦！\n记住这个小窍门：招牌动作认主人。你学会了\n吗？继续加油，你已经比上一秒更棒了！\n---", "grid": null, "image": null}, {"num": 6, "type": "九宫格", "stem": "请从下列文字中找出一句古诗词。", "options": [], "answer": "又送君归去", "analysis": "AI解析（仅供参考）：\n哎呀，是不是被这几个字绕得有点晕啦？别着\n急，老师陪着你一步步拨开云雾，咱们一起当\n回“诗词小侦探”！\n你瞧，这一串字使君才去归送春又大”，确\n实像被打乱顺序的拼图碎片。咱们先别慌着找\n诗，先闭上眼晴，想象一个画面：一场春雨刚\n停，花落了一地，好朋友马上就要坐船去很远很\n远的地方了。你站在渡口，心里满满的都是舍不\n得，却又不能不挥手告别。这个时候，你会最想\n说什么？\n对啦，就是想说我又要送你离开了呀”。这种心\n情，就藏在我们大才子王观的词里。原句是“又\n送君归去”。\n那为什么不是别的组合呢？这里有个小小的陷阱\n哦。很多小朋友一眼看到使君”，觉得像个人\n名，就想把它连起来。其实呀，这里的“君“是对\n朋友的美称，就是你“的意思。而”又送...归\n去“是古人送别时特别爱用的一个句式，表达又\n一次送你回去“的感伤。你把“又送君归去“连起来\n读一遍，是不是顺口多啦？那种惆怅的感觉一下\n子就出来了。\n以后再遇到这种乱序找诗“的题目，老师教你一\n个小窍门：先找找看有没有最常见的送别字眼\n比如“送”、“别”、“归”、“去”，试着把它们牵牵\n手。同时，要相信自己的语感一—如果读起来物\n口，多半就是排错队啦！\n恭喜你又解锁了一个新的诗词技能！记住，诗词\n不是冰冷的文字排列，而是千年前那颗温暖的心\n在跳动。下次遇到难题，随时来找我，咱们继续\n挖宝藏~\n试题解析：\n《卜算子送鲍浩然之浙东》\n作者：王观\n朝代：宋代\n水是眼波横，山是眉峰聚。欲问行人去那边？\n眉眼盈盈处。才始送春归，又送君归去。若到江\n南赶上春，千万和春住。\n赏析：\n这首词是一首送别之作。题目中的鲍浩然是作者\n的朋友，浙东是友人要去的地方。这首词分为两\n片，上片写友人回浙东去的山水行程，下片抒发\n作者对回归江南的友人的深情祝愿。\n白话文：\n水像美人流动的眼波，山如美人形起的眉毛。想\n问行人去哪里？到山水交汇的地方。\n刚送走了春天，又要送你回去。假如你到江南\n还能赶上春天的话，千万要把春天的景色留住。\n---", "grid": {"slots": 5, "rows": [["使", "君", "才"], ["去", "归", "送"], ["春", "又", "大"]]}, "image": null}, {"num": 7, "type": "单选题", "stem": "《早春呈水部张十八员外其一》 中\"最是一年春好处\"的\"处\"的意思是 什么？", "options": ["A.地方", "B.街道", "C.朝廷部门", "D.时节"], "answer": "D", "analysis": "AI解析（仅供参考）：\n小朋友，别急着看答案哦！咱们先一起做个小游\n戏～\n闭上眼睛，想象你正站在一场细细的春雨里，脚\n下的小草刚冒出针尖似的绿芽，软软的，远远望\n去像铺了一层青雾。这时候，如果你轻轻说一\n句：“哇，这真是一年里最棒的—“你觉得用哪\n个词接下去最顺口呢？是“最棒的地方”，还是“最\n棒的时光？\n其实，诗人韩愈写这句“最是一年春好处“时，心\n里也想着和你一样的感觉。他赞叹的是整个早春\n那种若有若无、嫩得能掐出水来的“时节”。古人\n用“处“字，有时并不指真的地点，比如“遥知兄弟\n登高处“的\"处“就是“时候”。这里也一样，“春好\n处“不是春天的某个角落，而是春天里最最美妙\n的那一段时光。\n所以，正确答案是D.时节。\n很多小伙伴会选A地方，觉得春天藏在公园里\n小河边。但诗人想说的是“这个时节“最珍贵，不\n是“这个地方“最美。你想想，如果满城都是烟柳\n繁华的晚春，他还觉得早春可爱吗？下次再遇\n到“处“字，可以悄悄问自己：诗人是在说一个可\n以走到的地点，还是在感叹一段虚虚的光阴呀～\n你刚才的思考特别棒，敢选敢想就是学诗词最厉\n害的超能力！继续用这种”画面想象法”，你会变\n成古诗赏景小达人的，加油！\n试题解析：\n《早春呈水部张十八员外》\n作者：韩愈\n朝代：唐代\n天街小雨润如酥，草色遥看近却无。\n最是一年春好处，绝胜烟柳满皇都。\n赏析：\n这首小诗是写给水部员外郎张籍的。张籍在兄弟\n辈中排行十八，故称“张十八。诗的风格清新自\n然，简直是口语化的。看似平淡，实则是绝不平\n淡的。韩愈自己说：“艰穷怪变得，往往造平\n淡”（《送无本师归范阳》）。原来他的“平淡“是\n来之不易的。\n白话文：\n京城的街道上空丝雨纷纷，雨丝就像乳汁般细密\n而滋润，小草钻出地面，远望草色依稀连成一\n片，近看时却显得稀疏零星。\n一年之中最美的就是这早春的景色，它远胜过了\n绿杨满城的暮春。\n---", "grid": null, "image": null}, {"num": 8, "type": "单选题", "stem": "以下四个关键词出自一首诗，诗的作 者是_(1）京口(2）钟山(3) 春风（4）明月", "options": ["A.辛弃疾", "B.刘禹锡", "C.杨万里", "D.王安石"], "answer": "D", "analysis": "AI解析（仅供参考）：\n小朋友，别灰心哦！这道题其实藏着一个小故\n事，咱们一起来当一回诗词小侦探，把它解开吧\n先闭上眼睛，想象这个画面：你站在“京口”（现\n在的江苏镇江），隔着江水望着对岸：身后不远\n就是“钟山”（南京紫金山），那里有你的家。这\n时，“春风“悄悄吹绿了江南，一轮“明月“挂在天\n上。你心里一酸，会想什么呢？一—呀，是不是\n想家了？这四样景物，组合起来就是一首浓浓的\n思乡诗。\n现在，咱们来对号入座。辛弃疾是南宋大词人，\n爱写金戈铁马：刘禹锡的诗风刚健，喜欢说理；\n杨万里是“诚斋体”，活泼自然。而上面这幅”月夜\n渡口望家山的图画，出自谁手呢？它正是北宋\n大诗人王安石《泊船瓜洲》里的句子：“京口瓜\n洲一水间，钟山只隔数重山。春风又绿江南岸，\n明月何时照我还。“你看，“京口”钟山春风”明\n月”，一个都不少！\n所以，正确答案是D王安石。\n很多小朋友会选A辛弃疾，可能是把京口“和辛\n弃疾的《永遇乐京口北固亨怀古》弄混了。其实\n辛弃疾写京口，是感叹英雄不再：而王安石写京\n口，是借眼前景抒归家情。以后见到这几个词组\n合在一起，你就在心里默念：“春风明月，绿岸\n钟山，那是老王想回家啦！“这个小口诀送给\n你，下次这题就是你的送分题“啦！\n你已经很厉害了，多读多品，诗里的风景都会成\n为你的朋友，继续加油哦！\n试题解析：\n《泊船瓜洲》\n作者：王安石\n朝代：宋代\n京口瓜洲一水间，钟山只隔数重山。\n春风又绿江南岸，明月何时照我还？\n赏析：\n这是一首著名的抒情小诗，抒发了诗人跳望江\n南、思念家乡的深切感情。\n本诗从字面上看，是流露着对故乡的怀念之情，\n大有急欲飞舟渡江回家和亲人团聚的愿望。其\n实，在字里行间也寓着他重返政治舞台、推行新\n政的强烈欲望。\n诗人回首江南，大地一片翠绿，这固然是春风吹\n绿的，但是那葱绿的禾苗难道不是变法措施产生\n的实效吗？但是官场是险象环生的，诗人望着\n这瓜洲渡口，也望着钟山的明月，发出了“明月\n何时照我还“的概叹，诗人是想早点离开是非黑\n白颠倒的官场，离开那丑恶，腐朽的地方体现作\n者希望重返那没有利益纷争的家乡，很有余韵。\n白话文：\n京口和瓜洲不过一水之遥，钟山也只隔着几重青\n山。\n---", "grid": null, "image": null}, {"num": 9, "type": "单选题", "stem": "请选择正确的排序：(1)问渠那得清如 许(2)为有源头活水来（3)半亩方塘 鉴开（4）天光云影共徘徊", "options": ["A. (3)(4)(1)(2)", "B. (3)(1)(4)(2)", "C.(4)(1)(3)(2)", "D. (4)(1)(2)(3)"], "answer": "A", "analysis": "AI解析（仅供参考）：\n小朋友，别灰心哦！排序题就像一个诗意的“拼\n图游戏”，拼错一次，离诗仙就更近一步啦\n咱们先闭上眼睛，想象一下诗人朱嘉正站在一个\n绝美的小池塘边一\n半亩方塘一鉴开(3)：池塘只有半亩大小，却\n像一面刚刚被打开的镜子，亮晶晶的，干干净\n净。\n天光云影共排徊（4）：紧接着，那蓝天的光和\n白云的影子，就在镜子般的水面上慢悠悠地荡来\n荡去，像在跳舞。\n问渠那得清如许（1)：诗人看得入迷，忍不住\n歪头问：“小池塘呀，你怎么能这么清澈透亮\n呢？“\n为有源头活水来（2）：最后他自己恍然大悟，\n回答：因为源头不断地有活水流进来呀！\n你看，这就是从看到景一产生疑问一找到答\n案“的自然顺序。很多孩子会选B，是把“问渠“句\n误放到第二句，可那时画面还没铺开就说问句，\n就像还没看见蛋糕就问味道，有点着急啦一\n所以正确排序是A：(3)（4)（1)(2）。\n小诀窍：读绝句时，前两句常常是“铺开画\n卷”，后两句才“亮出心思”。下次排序，可以问自\n已：诗人是先看到什么，再想到什么？\n你已经很厉害了，能发现排列中的“错位”，说明\n你在用诗人的眼睛观察世界呢！继续加油，你会\n成为古诗小侦探的～\n---", "grid": null, "image": null}, {"num": 10, "type": "单选题", "stem": "李贺《马诗二十三首·其五》的正确 顺序是（）（1）何当金络脑（2) 大漠沙如雪(3）快走踏清秋(4) 燕山月似钩", "options": ["A.(2)(4)(3）", "B.(4)(2)(1)(3)", "C.(2)(4)(1)(3)", "D.(4)(2)(3)(1)"], "answer": "C", "analysis": "AI解析（仅供参考）：\n小朋友，别着急，咱们一起来帮这匹“小马“找回\n它的诗句朋友～\n先听我讲个画面：\n想象一下，你来到了一片无边无际的沙漠，沙子\n被月光照得白白的，像铺了一地的雪。抬头\n一看，燕山上的月亮弯弯的，就像一把闪亮的银\n钩挂在天边。这时候，一匹骏马在想：“我什么\n时候才能戴上金色的笼头，在清爽的秋风里尽情\n奔跑呀？“这就是诗人李贺写下的心里话。\n接下来，咱们按照故事的顺序，把诗句排排队：\n1.（2）大漠沙如雪一—先写地上的景，沙\n像雪：\n2.（4）燕山月似钩\n再写天上的月，月\n如钩：\n3.（1）何当金络脑\n然后马开始发问：\n何时能戴金络头？\n4.（3）快走踏清秋\n最后回答：那就可\n以在清秋飞驰啦！\n所以，正确的顺序是(2）(4）(1)\n（3），也就是C选项\n小窍门记一记：\n很多写景抒情的古诗，都是“先看景，再抒情”。\n下次遇到排序题，先找写景的句子，再找表达心\n愿的句子，就像搭积木一样，画面在前、心声在\n后，就不会乱啦。\n你愿意静下心来想象画面，已经特别棒了！继续\n带着这颗好奇心，古诗里的世界会越来越好玩～\n试题解析：\n《马诗二十三首·其五》\n作者：李贺\n朝代：唐代\n大漠沙如雪，燕山月似钩。\n何当金络脑，快走踏清秋。\n赏析：\n这首诗看起来是写马，其实是借马来抒情，抒发\n诗人怀才不遇，不被统治者赏识，但又热切期望\n自己的抱负得以施展，可以为国建立功业。“大\n漠沙如雪，燕山月似钩。“这首小诗的前两句是\n说，平沙万里，在月光下像铺上一层白的霜\n雪。连绵的燕山山岭上，一弯明月当空。一、二\n句展现出一片富于特色的边疆战场景色。这幅战\n场景色，一般人也许只觉得悲凉肃杀，但对于志\n在报国之士却有着异乎寻常的吸引力。“钩“是一\n种弯刀，一种武器。从明晃晃的月牙联想到武器\n的形象，也就含有思战斗的意思。\n白话文：\n平沙万里，在月光下像铺上一层白的霜雪。\n连绵的燕山山岭上，一弯明月当空，如弯钩一\n般。\n---", "grid": null, "image": null}, {"num": 11, "type": "判断题", "stem": "诗句\"烈火焚烧若等闲\"中的\"等闲\"在 这里指：平常。", "options": ["A. 正确", "B. 错误"], "answer": "A", "analysis": "AI解析（仅供参考）：\n小朋友，别急着皱眉，咱们先把这道题当成一\n个“捉迷藏“游戏，一起把藏在诗句里的小秘密揪\n出来好不好？\n场景还原\n这句诗来自明代大诗人于谦的《石灰吟》。请你\n想象一个画面：一块坚硬灰扑扑的石灰石，被矿\n工伯伯投进了几千度的火炉里。可是你看它，不\n仅没有哭喊，反而很轻松、很平静，好像在\n说：“这不算什么大事儿。这种“不害怕、不当\ 已怀才不遇\n的影子。\n记住一个小窍门：杜牧爱写“翻转历史“的脑洞\n比如东风不与周郎便，铜雀春深锁二乔“卷土重\n来未可知——看到这种专门跟老天爷讨价还价\n的诗句，就往杜牧身上想，准没错！\n你已经从坑边绕过来了，下次再考作者，你就像\n个小侦探一样，从诗句的牌气里找线索。继续加\n油，古诗大海里，你我同舟共济！\n试题解析：\n《赤壁》\n作者：杜牧\n朝代：唐代\n折载沉沙铁未销，自将磨洗认前朝。\n东风不与周郎便，铜雀春深锁二乔。\n赏析：\n诗篇的开头借一件古物兴起对前朝人、事、\n物的概叹。\n折戟沉沙铁未销，自将磨洗认前朝。“这两\n句意为折断的战载沉在泥沙中并未被销蚀，自己\n将它磨洗后认出是前朝遗物。在这里，这两句描\n写看似平淡实为不平。沙里沉埋着断戟，点出了\n此地曾有过历史风云。战载折断沉沙却未被销\n蚀，暗含看岁月流逝而物是人非之感。正是由于\n发现了这一件沉埋江底六百多年，锈迹斑斑\n的“折戟”，使得诗人思绪万千，因此他要磨洗干\n净出来辨认一番，发现原来是赤壁之战遗留下来\n的兵器。这样前朝的遗物又进一步引发作者浮想\n联的思绪，为后文抒怀作了很好的铺垫。\n东风不与周郎便，铜雀春深锁二乔。这后\n两句久为人们所传诵的佳句，意为倘若当年东风\n不帮助周瑜的话，那么铜雀台就会深深地锁住东\n早一天了过用涨及到历中上蒸的志壁之战\n---", "grid": null, "image": null}, {"num": 24, "type": "单选题", "stem": "诗句\"乡村四月闲人少，才了蚕桑又 插田\"中的\"四月“被称作什么？", "options": ["A.暮春", "B.仲夏", "C.季夏", "D.孟夏"], "answer": "D", "analysis": "AI解析（仅供参考）：\n亲爱的同学，别担心，这道题虽然有点小陷阱，\n但咱们一起把它攻克下来，好吗？咱们先来\n想象一下诗里的画面：绿油油的山坡，白茫茫的\n水田，农民伯伯忙得脚不沾地，刚养完蚕又赶紧\n去插秧，多勤劳呀！\n第一步：哪里容易出错？\n这道题的关键在于四月“到底属于哪个季节。很\n多同学会觉得，春天是三四五月，那四月肯定\n是“暮春（晚春）“啦，一看选项A就选了它。这\n就是小陷阱所在！诗里的四月，指的是农历四\n月哦。\n第二步：推导正确路径\n咱们古代的月份，通常按农历算，而一年四季各\n有三个月，古人给它们起了很雅致的名宇：\n·春天：孟春、仲春、季春（暮春）一对\n应农历一、二、三月。\n夏天：孟夏、仲夏、季夏一对应农历\n四、五、六月。\n你看，农历四月正好是夏天的第一个月\n所以它就叫孟夏。选项D是正确答案。诗\n里说“蚕桑“插田”，也正是初夏时节典型的\n农忙景象呢。\n第三步：举一反三小窍门\n记住这个顺序就不会乱啦：孟、仲、季就\n像三兄弟，大哥（孟）、二哥（仲）、小\n弟（季），分别管每个季节的第一个月、\n第二个月和第三个月。比如春天大哥就\n是“孟春”。\n你已经很了不起了，会主动思考易错点，\n下次遇到这种月份雅称的题目，先想想\n它是“大哥、二哥还是小弟“就行啦！真\n棒，继续加油！\n试题解析：\n《乡村四月》\n作者：翁卷\n朝代：宋代\n绿遍山原白满川，子规声里雨如烟。\n乡村四月闲人少，才了蚕暴又插田。\n赏析：\n这首诗以白描手法写江南农村（今乐清市淡溪\n镇）初夏时节的景象，前两句着重写景：绿原、\n白川、子规、烟雨，寥寥几笔就把水乡初夏时特\n有的景色勾勒了出来。\n白话文：\n山坡田野间草木茂盛，稻田里的水色与天光相辉\n映。天空中烟雨蒙蒙，杜鹃声声啼叫，大地一片\n欣欣向荣的景象。\n四月到了，没有人闲着，刚刚结束了蚕桑的事又\n要插秧了。\n---", "grid": null, "image": null}, {"num": 25, "type": "单选题", "stem": "常恐秋节至，_____华叶衰。", "options": ["A.焜黄", "B.琨黄", "C.崛黄", "D.昆黄"], "answer": "A", "analysis": "AI解析（仅供参考）：\n小朋友，别为这道题皱眉头哦！咱们一起化身小\n侦探，到古诗的画卷里找找线索吧\n你瞧，这句诗来自汉乐府《长歌行》，它讲的是\n园中葵菜在春光里长得绿油油，可心里总担忧秋\n天一来，原本茂盛的叶子就会变\n凋零落\n下来。这个空要填的，正是描绘叶子“枯黄颜\n色“的词。\n四个选项长得是不是像四胞胎？咱们来辨一辨\nB.琨黄：“琨“是美玉，美玉那种黄和枯叶黄\n可不一样，诗人不会用它写衰败。\nC.黄、D.昆黄：““和“昆\"都常指山（比\n如昆仑山），山色苍翠，跟 let current = 0;
let answered = false;
const results = {};
const timings = {};  // {idx: {start, elapsed, timeout}}

const TIMER_SECONDS = 30;
let timerInterval = null;
let timerStart = null;

function startTimer() {
  clearInterval(timerInterval);
  timerStart = Date.now();
  let remaining = TIMER_SECONDS;
  updateTimerDisplay(remaining);
  timerInterval = setInterval(() => {
    remaining--;
    updateTimerDisplay(remaining);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      if (!answered) {
        timings[current] = { elapsed: TIMER_SECONDS, timeout: true };
        autoSubmit();
      }
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  if (timerStart !== null) {
    const elapsed = Math.min(Math.round((Date.now() - timerStart) / 1000), TIMER_SECONDS);
    if (!timings[current]) timings[current] = { elapsed, timeout: false };
    timerStart = null;
  }
}

function updateTimerDisplay(remaining) {
  const el = document.getElementById('timer');
  if (!el) return;
  el.textContent = `⏱ ${remaining}s`;
  el.className = 'timer' + (remaining <= 5 ? ' danger' : remaining <= 10 ? ' warning' : '');
}

function autoSubmit() {
  const q = questions[current];
  const isGrid = !!q.grid;
  answered = true;
  if (isGrid) {
    const userAns = gridInput.join('');
    const isOk = gridInput.length === q.grid.slots && userAns === q.answer;
    results[current] = isOk;
    document.querySelectorAll('.grid-slot').forEach(s => s.classList.add(isOk ? 'correct' : 'wrong'));
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.add('disabled'));
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : `❌ 时间到！正确答案是：${q.answer}`;
  } else {
    const selected = document.querySelector('.option.selected');
    const chosen = selected ? selected.dataset.letter : null;
    const correct = q.answer;
    results[current] = chosen === correct;
    document.querySelectorAll('.option').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === correct) o.classList.add('correct');
      else if (o.dataset.letter === chosen) o.classList.add('wrong');
    });
    const isOk = chosen === correct;
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : (chosen ? `❌ 回答错误，正确答案是 ${correct}` : `❌ 时间到！正确答案是 ${correct}`);
  }
  document.getElementById('analysis').classList.add('show');
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
  const timerEl = document.getElementById('timer');
  if (timerEl) timerEl.style.display = 'none';
  updateNav();
}

function buildNav() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = questions.map((q, i) =>
    `<button class="nav-btn" id="nav-${i}" onclick="jumpTo(${i})">${i+1}</button>`
  ).join('');
}

function updateNav() {
  questions.forEach((_, i) => {
    const btn = document.getElementById('nav-' + i);
    btn.className = 'nav-btn';
    if (i === current) btn.classList.add('active');
    if (results[i] === true) btn.classList.add('correct');
    else if (results[i] === false) btn.classList.add('wrong');
  });
}

function jumpTo(idx) {
  stopTimer();
  current = idx;
  render(idx);
}

function buildGridHtml(grid, answeredInput) {
  const slots = grid.slots;
  // 红色答案槽
  let slotsHtml = '<div class="grid-slots" id="grid-slots">';
  for (let i = 0; i < slots; i++) {
    const ch = answeredInput ? answeredInput[i] || '' : '';
    slotsHtml += `<div class="grid-slot${ch ? ' filled' : ''}" id="slot-${i}" onclick="removeSlot(${i})">${ch}</div>`;
  }
  slotsHtml += '</div>';
  // 候选字格
  let candidatesHtml = '<div class="grid-candidates" id="grid-candidates">';
  for (const row of grid.rows) {
    candidatesHtml += '<div class="grid-row">';
    for (const ch of row) {
      const used = answeredInput && answeredInput.includes(ch) &&
                   answeredInput.split('').filter(c=>c===ch).length >=
                   row.filter(c=>c===ch).length;
      candidatesHtml += `<div class="grid-cell${answeredInput ? ' disabled' : (used ? ' used' : '')}"
        data-char="${ch}" onclick="fillSlot('${ch}', this)">${ch}</div>`;
    }
    candidatesHtml += '</div>';
  }
  candidatesHtml += '</div>';
  return slotsHtml + candidatesHtml;
}

let gridInput = [];  // 当前宫格已填入的字

function fillSlot(ch, el) {
  if (answered || el.classList.contains('used') || el.classList.contains('disabled')) return;
  const q = questions[current];
  if (gridInput.length >= q.grid.slots) return;
  gridInput.push(ch);
  el.classList.add('used');
  const idx = gridInput.length - 1;
  const slot = document.getElementById('slot-' + idx);
  slot.textContent = ch;
  slot.classList.add('filled');
}

function removeSlot(idx) {
  if (answered) return;
  if (idx >= gridInput.length) return;
  gridInput.splice(idx, 1);
  const q = questions[current];
  for (let i = 0; i < q.grid.slots; i++) {
    const slot = document.getElementById('slot-' + i);
    const ch = gridInput[i] || '';
    slot.textContent = ch;
    slot.classList.toggle('filled', !!ch);
  }
  refreshCandidateUsed();
}

  for (let i = 0; i < q.grid.slots; i++) {
    const slot = document.getElementById('slot-' + i);
    const ch = gridInput[i] || '';
    slot.textContent = ch;
    slot.classList.toggle('filled', !!ch);
  }
  // 重置候选字格的 used 状态（重新计算）
  refreshCandidateUsed();
}

function refreshCandidateUsed() {
  const cells = document.querySelectorAll('.grid-cell');
  // 统计 gridInput 里每个字的使用次数
  const usedCount = {};
  for (const ch of gridInput) usedCount[ch] = (usedCount[ch] || 0) + 1;
  // 对每个候选格，按同字出现顺序决定是否标 used
  const seen = {};
  cells.forEach(cell => {
    const ch = cell.dataset.char;
    seen[ch] = (seen[ch] || 0) + 1;
    cell.classList.toggle('used', seen[ch] <= (usedCount[ch] || 0));
  });
}

function render(idx) {
  answered = idx in results;
  gridInput = [];
  const q = questions[idx];
  const total = questions.length;
  document.getElementById('progress').textContent = `第 ${idx+1} / ${total} 题`;

  const isGrid = !!q.grid;
  let bodyHtml = '';

  if (isGrid) {
    const answeredInput = answered ? q.answer : null;
    bodyHtml = `<div class="grid-wrap">${buildGridHtml(q.grid, answeredInput)}</div>`;
    if (answered) gridInput = q.answer.split('');
  } else {
    const optHtml = q.options.map((opt, i) => {
      const letter = opt.match(/^([A-D])/)?.[1] || String.fromCharCode(65+i);
      const text = opt.replace(/^[A-D][\.．。]\s*/, '');
      return `<div class="option" data-letter="${letter}" onclick="select(this)">
        <span class="label">${letter}</span><span>${text}</span>
      </div>`;
    }).join('');
    bodyHtml = `<div class="options" id="options">${optHtml}</div>`;
  }

  document.getElementById('card').innerHTML = `
    <div class="tag">${q.type}<span id="timer" class="timer" ${answered ? 'style="display:none"' : ''}>⏱ ${TIMER_SECONDS}s</span></div>
    <div class="stem">${q.stem}</div>
    ${q.image ? `<img class="question-img" src="${q.image}">` : ''}
    ${bodyHtml}
    <div class="btn-row">
      <button class="btn btn-submit" id="btn-submit" onclick="submit()" ${answered ? 'style="display:none"' : ''}>提交答案</button>
      <button class="btn btn-next" id="btn-next" onclick="next()" ${answered ? '' : 'style="display:none"'}>
        ${idx < total-1 ? '下一题 →' : '完成 ✓'}
      </button>
    </div>
    <div class="result ${answered ? 'show ' + (results[idx] ? 'ok' : 'fail') : ''}" id="result">
      ${answered ? (results[idx] ? '✅ 回答正确！' : `❌ 回答错误，正确答案是：${q.answer}`) : ''}
    </div>
    <div class="analysis ${answered ? 'show' : ''}" id="analysis">
      <div class="analysis-title">📖 解析</div>
      ${q.analysis}
    </div>
  `;

  if (!isGrid && answered) {
    document.querySelectorAll('.option').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === q.answer) o.classList.add('correct');
    });
  }

  if (isGrid && answered) {
    const isOk = results[idx];
    document.querySelectorAll('.grid-slot').forEach(s => {
      s.classList.add(isOk ? 'correct' : 'wrong');
    });
  }

  if (!answered) startTimer();
  updateNav();
}

function select(el) {
  if (answered) return;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function submit() {
  if (answered) return;
  const q = questions[current];
  const isGrid = !!q.grid;
  answered = true;
  stopTimer();

  if (isGrid) {
    if (gridInput.length < q.grid.slots) { answered = false; alert('请先填满所有格子'); return; }
    const userAns = gridInput.join('');
    const isOk = userAns === q.answer;
    results[current] = isOk;
    document.querySelectorAll('.grid-slot').forEach(s => s.classList.add(isOk ? 'correct' : 'wrong'));
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.add('disabled'));
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : `❌ 回答错误，正确答案是：${q.answer}`;
  } else {
    const selected = document.querySelector('.option.selected');
    if (!selected) { answered = false; alert('请选择一个答案'); return; }
    const chosen = selected.dataset.letter;
    const correct = q.answer;
    document.querySelectorAll('.option').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === correct) o.classList.add('correct');
      else if (o.dataset.letter === chosen) o.classList.add('wrong');
    });
    const isOk = chosen === correct;
    results[current] = isOk;
    const result = document.getElementById('result');
    result.className = 'result show ' + (isOk ? 'ok' : 'fail');
    result.textContent = isOk ? '✅ 回答正确！' : `❌ 回答错误，正确答案是 ${correct}`;
  }

  document.getElementById('analysis').classList.add('show');
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
  const timerEl = document.getElementById('timer');
  if (timerEl) timerEl.style.display = 'none';
  updateNav();
}

function next() {
  stopTimer();
  current++;
  if (current >= questions.length) {
    const correct = Object.values(results).filter(v => v === true).length;
    const total = questions.length;
    document.getElementById('progress').textContent = '';
    document.getElementById('card').innerHTML = `
      <div class="finish">
        <h2>🎉 全部完成！</h2>
        <p>共 ${total} 题，答对 ${correct} 题，答错 ${total - correct} 题</p>
        <p>正确率：${Math.round(correct/total*100)}%</p>
      </div>`;
    updateNav();
  } else {
    render(current);
  }
}

function downloadResults() {
  const now = new Date();
  const dateStr = now.toLocaleString('zh-CN');
  const data = questions.map((q, i) => {
    const t = timings[i] || {};
    return {
      题号: q.num,
      题型: q.type,
      题干: q.stem,
      正确答案: q.answer,
      结果: results[i] === true ? '正确' : results[i] === false ? '错误' : '未作答',
      用时秒: t.elapsed ?? '-',
      超时: t.timeout ? '是' : '否',
    };
  });
  const correct = Object.values(results).filter(v => v === true).length;
  const output = {
    答题时间: dateStr,
    总题数: questions.length,
    答对: correct,
    答错: questions.length - correct,
    正确率: Math.round(correct / questions.length * 100) + '%',
    明细: data,
  };
  const blob = new Blob([JSON.stringify(output, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `答题记录_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

buildNav();
render(0);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
